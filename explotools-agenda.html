// ====== CALENDAR ======
var MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var DAYS_SHORT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function toggleCalDone() {
  state.calShowDone = !state.calShowDone;
  var btn = document.getElementById('calDoneToggle');
  if (btn) btn.classList.toggle('active', state.calShowDone);
  saveState();
  renderCalendar();
}

function updateCalDoneBtn() {
  var btn = document.getElementById('calDoneToggle');
  if (btn) btn.classList.toggle('active', state.calShowDone);
}

function getCalFiltered() {
  var tasks = getFiltered();
  if (!state.calShowDone) tasks = tasks.filter(function(t) { return t.status !== 'done'; });
  // hide tasks from completed projects in calendar
  tasks = tasks.filter(function(t) {
    if (!t.project) return true;
    var proj = state.projects.find(function(p) { return p.id === t.project; });
    return !proj || !proj.done;
  });
  return tasks;
}

function setCalSubView(v) {
  state.calSubView = v;
  ['daily','weekly','monthly'].forEach(function(sv) {
    var el = document.getElementById('sv-' + sv);
    if (el) el.classList.toggle('active', sv === v);
  });
  renderCalendar();
}

function calNavigate(delta) {
  var d = state.calDate;
  if (state.calSubView === 'monthly') {
    state.calDate = new Date(d.getFullYear(), d.getMonth() + delta, 1);
  } else if (state.calSubView === 'weekly') {
    state.calDate = new Date(d.getFullYear(), d.getMonth(), d.getDate() + delta * 7);
  } else {
    state.calDate = new Date(d.getFullYear(), d.getMonth(), d.getDate() + delta);
  }
  renderCalendar();
}

function renderCalendar() {
  var d = (state.calDate instanceof Date && !isNaN(state.calDate)) ? state.calDate : new Date();
  state.calDate = d;
  updateCalDoneBtn();
  if (state.calSubView === 'daily') renderCalendarDaily(d);
  else if (state.calSubView === 'weekly') renderCalendarWeekly(d);
  else renderCalendarMonthly(d);
}

function renderCalendarMonthly(d) {
  var y = d.getFullYear(), m = d.getMonth();
  document.getElementById('calTitle').textContent = MONTHS[m] + ' ' + y;
  var body = document.getElementById('calBody');
  body.innerHTML = '<div class="cal-grid" id="calGrid"></div>';
  var grid = document.getElementById('calGrid');
  DAYS_SHORT.forEach(function(dn) {
    var el = document.createElement('div'); el.className = 'cal-dow'; el.textContent = dn; grid.appendChild(el);
  });
  var first = new Date(y,m,1).getDay();
  var total = new Date(y,m+1,0).getDate();
  var prevTotal = new Date(y,m,0).getDate();
  var today = new Date();
  var tasks = getCalFiltered();
  for (var i = first-1; i >= 0; i--) {
    var el = document.createElement('div'); el.className = 'cal-day other';
    el.innerHTML = '<div class="cal-num">' + (prevTotal-i) + '</div>'; grid.appendChild(el);
  }
  for (var day = 1; day <= total; day++) {
    var isToday = today.getDate()===day && today.getMonth()===m && today.getFullYear()===y;
    var el = document.createElement('div'); el.className = 'cal-day' + (isToday ? ' today' : '');
    var dayTasks = tasks.filter(function(t) { if(!t.date) return false; var td=new Date(t.date); return td.getDate()===day&&td.getMonth()===m&&td.getFullYear()===y; });
    var evHtml = dayTasks.slice(0,3).map(function(t) {
      var sc = STATUS_COLORS[t.status] || '#5a6080';
      var sec = state.sectors.find(function(s){return s.id===t.sector;});
      var secColor = sec ? sec.color : null;
      var isOverdue = t.date && new Date(t.date) < new Date() && t.status !== 'done';
      return '<div class="cal-ev" style="background:'+sc+'18;color:'+sc+';border-left:2px solid '+sc+'" data-id="'+t.id+'">' +
        '<span class="cal-ev-title">'+esc(t.title)+'</span>' +
        (secColor ? '<span class="cal-ev-dot" style="background:'+secColor+'"></span>' : '') +
        (isOverdue ? '<span class="cal-ev-overdue" title="Atrasada">!</span>' : '') +
      '</div>';
    }).join('');
    if (dayTasks.length > 3) evHtml += '<div style="font-size:10px;color:var(--text3);padding:1px 6px">+' + (dayTasks.length-3) + '</div>';
    el.innerHTML = '<div class="cal-num">' + day + '</div>' + evHtml;
    (function(dd) {
      el.onclick = function(e) {
        if (e.target.classList.contains('cal-ev')) { openEditTask(e.target.dataset.id); return; }
        var ds = y + '-' + String(m+1).padStart(2,'0') + '-' + String(dd).padStart(2,'0') + 'T09:00';
        openNewTask('todo', ds);
      };
    })(day);
    grid.appendChild(el);
  }
  var rem = (first+total)%7;
  if (rem) for (var d2=1; d2<=7-rem; d2++) { var el=document.createElement('div'); el.className='cal-day other'; el.innerHTML='<div class="cal-num">'+d2+'</div>'; grid.appendChild(el); }
}

function renderCalendarWeekly(d) {
  // find start of week (Sunday)
  var dayOfWeek = d.getDay();
  var weekStart = new Date(d.getFullYear(), d.getMonth(), d.getDate() - dayOfWeek);
  var weekEnd = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + 6);
  // title
  var titleStr;
  if (weekStart.getMonth() === weekEnd.getMonth()) {
    titleStr = MONTHS[weekStart.getMonth()] + ' ' + weekStart.getFullYear();
  } else {
    titleStr = MONTHS[weekStart.getMonth()] + ' – ' + MONTHS[weekEnd.getMonth()] + ' ' + weekEnd.getFullYear();
  }
  document.getElementById('calTitle').textContent = titleStr;
  var body = document.getElementById('calBody');
  body.innerHTML = '<div class="cal-week-grid" id="calWeekGrid"></div>';
  var grid = document.getElementById('calWeekGrid');
  var today = new Date();
  var tasks = getCalFiltered();
  for (var i = 0; i < 7; i++) {
    var day = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + i);
    var isToday = day.getDate()===today.getDate() && day.getMonth()===today.getMonth() && day.getFullYear()===today.getFullYear();
    var col = document.createElement('div'); col.className = 'cal-week-col';
    var numStr = String(day.getDate()).padStart(2,'0');
    col.innerHTML =
      '<div class="cal-week-hd">' +
        '<div class="cal-week-dn">' + DAYS_SHORT[i] + '</div>' +
        '<div class="cal-week-num' + (isToday?' today':'') + '">' + numStr + '</div>' +
      '</div>' +
      '<div class="cal-week-body" data-date="' + fmtDateVal(day) + '"></div>';
    grid.appendChild(col);
    var wb = col.querySelector('.cal-week-body');
    var dayTasks = tasks.filter(function(t) { if(!t.date) return false; var td=new Date(t.date); return td.getDate()===day.getDate()&&td.getMonth()===day.getMonth()&&td.getFullYear()===day.getFullYear(); });
    dayTasks.forEach(function(t) {
      var sc = STATUS_COLORS[t.status] || '#5a6080';
      var sec = state.sectors.find(function(s){return s.id===t.sector;});
      var ev = document.createElement('div');
      ev.className = 'cal-ev';
      ev.style.background = sc+'18';
      ev.style.color = sc;
      ev.style.borderLeft = '2px solid ' + sc;
      ev.style.marginBottom = '4px';
      ev.dataset.id = t.id;
      var isOverdueW = t.date && new Date(t.date) < new Date() && t.status !== 'done';
      ev.innerHTML = '<span class="cal-ev-title">'+esc(t.title)+'</span>' +
        (sec ? '<span class="cal-ev-dot" style="background:'+sec.color+'"></span>' : '') +
        (isOverdueW ? '<span class="cal-ev-overdue" title="Atrasada">!</span>' : '');
      ev.onclick = function(e) { e.stopPropagation(); openEditTask(t.id); };
      wb.appendChild(ev);
    });
    (function(ds) {
      wb.onclick = function(e) { if (e.target !== wb) return; openNewTask('todo', ds+'T09:00'); };
    })(fmtDateVal(day));
  }
}

function renderCalendarDaily(d) {
  var y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
  var weekDays = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  var isToday = (function() { var t=new Date(); return t.getDate()===day&&t.getMonth()===m&&t.getFullYear()===y; })();
  document.getElementById('calTitle').textContent = weekDays[d.getDay()] + ', ' + day + ' de ' + MONTHS[m];

  var body = document.getElementById('calBody');
  var ds = fmtDateVal(d);

  // Separate tasks: with time vs all-day
  var allTasks = getCalFiltered().filter(function(t) {
    if (!t.date) return false;
    var td = new Date(t.date);
    return td.getDate()===day && td.getMonth()===m && td.getFullYear()===y;
  });
  var timedTasks  = allTasks.filter(function(t) { return t.date && t.date.includes('T'); });
  var allDayTasks = allTasks.filter(function(t) { return !t.date || !t.date.includes('T'); });
  // Also include tasks with no date at all that are in state (day-only)
  timedTasks.sort(function(a,b) { return a.date > b.date ? 1 : -1; });

  var now = new Date();
  var PX_PER_MIN = 1; // 60px per hour = 1px per min
  var HOUR_H = 60;
  var START_H = 6; // show from 06:00
  var END_H   = 23; // to 23:00
  var TOTAL_H = END_H - START_H;

  // Build wrapper
  var wrap = document.createElement('div');
  wrap.className = 'cal-daily';

  // ── Header ──
  var hd = document.createElement('div');
  hd.className = 'cal-daily-hd';
  hd.innerHTML =
    '<div class="cal-daily-title">' + (isToday ? '— Hoje —' : weekDays[d.getDay()] + ', ' + day + ' de ' + MONTHS[m]) + '</div>' +
    '<button class="cal-add-btn" style="width:auto;margin:0;padding:6px 12px;" onclick="openNewTask(\'todo\',\''+ds+'T09:00\')">' +
      '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
      'Nova tarefa' +
    '</button>';
  wrap.appendChild(hd);

  var bodyEl = document.createElement('div');
  bodyEl.className = 'cal-daily-body';

  // ── All-day section ──
  var allDay = document.createElement('div');
  allDay.className = 'cal-allday';
  allDay.innerHTML = '<div class="cal-allday-label">Sem<br>hora</div>';
  var allDayTasksEl = document.createElement('div');
  allDayTasksEl.className = 'cal-allday-tasks';
  if (allDayTasks.length === 0) {
    allDayTasksEl.innerHTML = '<span class="cal-allday-empty">Nenhuma</span>';
  } else {
    allDayTasks.forEach(function(t) {
      var sc = STATUS_COLORS[t.status] || '#5a6080';
      var s  = state.sectors.find(function(s){return s.id===t.sector;});
      var isOv = t.date && new Date(t.date) < now && t.status !== 'done';
      var chip = document.createElement('div');
      chip.className = 'cal-allday-chip';
      chip.style.borderLeftColor = sc;
      chip.style.color = sc;
      chip.innerHTML =
        esc(t.title) +
        (s ? '<span style="width:6px;height:6px;border-radius:50%;background:'+s.color+';flex-shrink:0;display:inline-block"></span>' : '') +
        (isOv ? '<span style="width:12px;height:12px;border-radius:50%;background:var(--red);color:#fff;font-size:7px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">!</span>' : '');
      chip.addEventListener('click', function() { openEditTask(t.id); });
      allDayTasksEl.appendChild(chip);
    });
  }
  allDay.appendChild(allDayTasksEl);
  bodyEl.appendChild(allDay);

  // ── Time grid ──
  var tgWrap = document.createElement('div');
  tgWrap.className = 'cal-timegrid';
  var tgScroll = document.createElement('div');
  tgScroll.className = 'cal-timegrid-scroll';
  var tgInner = document.createElement('div');
  tgInner.className = 'cal-tg-inner';
  tgInner.style.height = (TOTAL_H * HOUR_H) + 'px';

  // Draw hour rows
  for (var h = START_H; h <= END_H; h++) {
    var row = document.createElement('div');
    row.className = 'cal-tg-hour';
    row.style.top = ((h - START_H) * HOUR_H) + 'px';
    row.style.position = 'absolute';
    row.style.left = '0';
    row.style.right = '0';
    row.style.height = HOUR_H + 'px';
    var lbl = String(h).padStart(2,'0') + ':00';
    row.innerHTML =
      '<div class="cal-tg-hour-label">' + lbl + '</div>' +
      '<div class="cal-tg-hour-line"><div class="cal-tg-halfline"></div></div>';
    // Click zone for adding task at this hour
    (function(hh) {
      row.querySelector('.cal-tg-hour-line').addEventListener('click', function(e) {
        var rect = this.getBoundingClientRect();
        var relY = e.clientY - rect.top;
        var mins = Math.floor(relY / PX_PER_MIN);
        var slotMins = Math.round(mins / 15) * 15;
        var hStr = String(hh).padStart(2,'0') + ':' + String(slotMins).padStart(2,'0');
        openNewTask('todo', ds + 'T' + hStr);
      });
    })(h);
    tgInner.appendChild(row);
  }

  // Draw timed task events
  timedTasks.forEach(function(t) {
    var sc = STATUS_COLORS[t.status] || '#5a6080';
    var s  = state.sectors.find(function(s){return s.id===t.sector;});
    var timeStr = t.date.slice(11,16);
    var parts = timeStr.split(':');
    var hh = parseInt(parts[0],10), mm = parseInt(parts[1],10);
    var topPx = ((hh - START_H) * HOUR_H) + (mm * PX_PER_MIN);
    if (topPx < 0) topPx = 0;
    var isOv = new Date(t.date) < now && t.status !== 'done';

    var ev = document.createElement('div');
    ev.className = 'cal-tg-event';
    ev.style.top = topPx + 'px';
    ev.style.left = '60px';
    ev.style.right = '8px';
    ev.style.height = Math.max(22, HOUR_H - 4) + 'px';
    ev.style.background = sc + '22';
    ev.style.borderLeftColor = sc;
    ev.style.color = sc;
    ev.innerHTML =
      '<div class="cal-tg-event-title">' + esc(t.title) + '</div>' +
      '<div class="cal-tg-event-meta">' + timeStr + (s ? ' · ' + esc(s.name) : '') + '</div>' +
      (isOv ? '<div class="cal-tg-event-badge">!</div>' : '');
    ev.addEventListener('click', function() { openEditTask(t.id); });
    tgInner.appendChild(ev);
  });

  // Draw "now" line if today
  if (isToday) {
    var nowH = now.getHours(), nowM = now.getMinutes();
    var nowTop = ((nowH - START_H) * HOUR_H) + (nowM * PX_PER_MIN);
    if (nowTop >= 0 && nowTop <= TOTAL_H * HOUR_H) {
      var nowLine = document.createElement('div');
      nowLine.className = 'cal-now-line';
      nowLine.style.top = nowTop + 'px';
      nowLine.innerHTML = '<div class="cal-now-dot"></div>';
      tgInner.appendChild(nowLine);
    }
  }

  tgScroll.appendChild(tgInner);
  tgWrap.appendChild(tgScroll);
  bodyEl.appendChild(tgWrap);
  wrap.appendChild(bodyEl);
  body.innerHTML = '';
  body.appendChild(wrap);

  // Auto-scroll to current time (or 8am)
  if (isToday) {
    var scrollTo = ((now.getHours() - START_H - 1) * HOUR_H);
    tgScroll.scrollTop = Math.max(0, scrollTo);
  } else {
    tgScroll.scrollTop = (8 - START_H) * HOUR_H;
  }

  // Set calBody height so it fills properly
  body.style.overflow = 'hidden';
  body.style.display = 'flex';
  body.style.flexDirection = 'column';
  body.style.height = 'calc(100vh - 280px)';
}

function fmtDateVal(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ====== DASHBOARD ======
function renderDashboard() {
  var el = document.getElementById('dashboardView');
  el.innerHTML = '';
  var now = new Date();
  var tasks = state.tasks;
  var total = tasks.length;
  var byStatus = { todo: 0, doing: 0, waiting: 0, done: 0 };
  var overdueTasks = [];
  tasks.forEach(function(t) {
    byStatus[t.status] = (byStatus[t.status] || 0) + 1;
    if (t.date && new Date(t.date) < now && t.status !== 'done') overdueTasks.push(t);
  });
  overdueTasks.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });

  // This week range
  var dow = now.getDay();
  var weekStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - dow);
  var weekEnd   = new Date(now.getFullYear(), now.getMonth(), now.getDate() + (6 - dow), 23, 59, 59);
  var thisWeek  = tasks.filter(function(t) { if (!t.date) return false; var d = new Date(t.date); return d >= weekStart && d <= weekEnd; }).length;
  var pct = total > 0 ? Math.round((byStatus.done / total) * 100) : 0;
  var activeProjs = state.projects.filter(function(p) { return !p.done; }).length;

  var dash = document.createElement('div');
  dash.className = 'dash';

  // ── KPI SECTION ──
  var kpiSection = document.createElement('div');
  kpiSection.innerHTML = '<div class="dash-section-title">Visão Geral</div>';
  var kpiGrid = document.createElement('div');
  kpiGrid.className = 'kpi-grid';

  var kpis = [
    { label: 'Total de Tarefas',   value: total,           sub: 'cadastradas',             cls: 'kc-blue',   badge: null },
    { label: 'Em Andamento',       value: byStatus.doing,  sub: 'em execução agora',        cls: 'kc-red',    badge: null },
    { label: 'Atrasadas',          value: overdueTasks.length, sub: 'com prazo vencido',   cls: 'kc-yellow', badge: overdueTasks.length > 0 ? { text: 'atenção', type: 'bad' } : { text: 'em dia', type: 'good' } },
    { label: 'Taxa de Conclusão',  value: pct + '%',       sub: byStatus.done + ' concluídas', cls: 'kc-green',  badge: null },
    { label: 'Projetos Ativos',    value: activeProjs,     sub: 'em andamento',             cls: 'kc-purple', badge: null },
    { label: 'Esta Semana',        value: thisWeek,        sub: 'tarefas com prazo',        cls: 'kc-cyan',   badge: null }
  ];

  kpis.forEach(function(k) {
    var card = document.createElement('div');
    card.className = 'kpi-card ' + k.cls;
    card.innerHTML =
      '<div class="kpi-label">' + k.label + '</div>' +
      '<div class="kpi-value">' + k.value + '</div>' +
      (k.badge ? '<div class="kpi-badge ' + k.badge.type + '">' + k.badge.text + '</div>' : '<div class="kpi-sub">' + k.sub + '</div>');
    kpiGrid.appendChild(card);
  });
  kpiSection.appendChild(kpiGrid);
  dash.appendChild(kpiSection);

  // ── ROW 1: Donut + Barras Setor + Barras Projeto ──
  var row1 = document.createElement('div');
  row1.className = 'dash-charts-row';

  // Donut: status
  row1.appendChild(buildDonutCard(
    'Tarefas por Etapa',
    [
      { label: 'A Fazer',            val: byStatus.todo,    color: '#4a9eff' },
      { label: 'Em Andamento',       val: byStatus.doing,   color: '#e8000d' },
      { label: 'Aguardando',         val: byStatus.waiting, color: '#f59e0b' },
      { label: 'Concluído',          val: byStatus.done,    color: '#00e676' }
    ]
  ));

  // Barras: por setor
  row1.appendChild(buildBarCard('Tarefas por Setor', buildSectorBars(tasks)));

  // Barras: por projeto
  row1.appendChild(buildBarCard('Tarefas por Projeto', buildProjectBars(tasks)));

  dash.appendChild(row1);

  // ── ROW 2: Timeline 7 dias + Atrasadas ──
  var row2 = document.createElement('div');
  row2.className = 'dash-charts-row-2';
  row2.appendChild(buildTimelineCard(tasks));
  row2.appendChild(buildOverdueCard(overdueTasks));
  dash.appendChild(row2);

  el.appendChild(dash);
}

function buildDonutCard(title, segments) {
  var card = document.createElement('div');
  card.className = 'dash-card';
  card.innerHTML = '<div class="dash-section-title">' + title + '</div>';

  var total = segments.reduce(function(s, x) { return s + x.val; }, 0);
  var wrap = document.createElement('div');
  wrap.className = 'chart-donut-wrap';

  // SVG donut
  var size = 110, cx = 55, cy = 55, r = 40, stroke = 14;
  var circ = 2 * Math.PI * r;
  var offset = 0;
  var paths = '';
  segments.forEach(function(seg) {
    if (!total || !seg.val) return;
    var pct = seg.val / total;
    var dash = pct * circ;
    var gap  = circ - dash;
    paths += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + seg.color + '" stroke-width="' + stroke + '" stroke-dasharray="' + dash.toFixed(2) + ' ' + gap.toFixed(2) + '" stroke-dashoffset="' + (-(offset * circ)).toFixed(2) + '" stroke-linecap="butt" transform="rotate(-90 ' + cx + ' ' + cy + ')"/>';
    offset += pct;
  });

  var pctDone = total > 0 ? Math.round((segments.find(function(s) { return s.label === 'Concluído'; }).val / total) * 100) : 0;
  var svg = '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--surface2)" stroke-width="' + stroke + '"/>' +
    paths +
    '<text x="' + cx + '" y="' + (cy - 4) + '" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="18" font-weight="700" fill="var(--text)">' + pctDone + '%</text>' +
    '<text x="' + cx + '" y="' + (cy + 12) + '" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8" fill="var(--text3)">CONCLUÍDO</text>' +
  '</svg>';

  var svgWrap = document.createElement('div');
  svgWrap.innerHTML = svg;
  wrap.appendChild(svgWrap);

  // legend
  var legend = document.createElement('div');
  legend.className = 'chart-legend';
  segments.forEach(function(seg) {
    var pctSeg = total > 0 ? Math.round((seg.val / total) * 100) : 0;
    legend.innerHTML +=
      '<div class="legend-item">' +
        '<span class="legend-dot" style="background:' + seg.color + '"></span>' +
        '<span>' + seg.label + '</span>' +
        '<span class="legend-val">' + seg.val + ' <span style="opacity:.5">(' + pctSeg + '%)</span></span>' +
      '</div>';
  });
  wrap.appendChild(legend);
  card.appendChild(wrap);
  return card;
}

function buildBarCard(title, rows) {
  var card = document.createElement('div');
  card.className = 'dash-card';
  card.innerHTML = '<div class="dash-section-title">' + title + '</div>';
  var maxVal = rows.reduce(function(m, r) { return Math.max(m, r.val); }, 1);
  rows.forEach(function(r) {
    var pct = Math.round((r.val / maxVal) * 100);
    card.innerHTML +=
      '<div class="bar-row">' +
        '<span class="bar-lbl" title="' + r.label + '">' + r.label + '</span>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + r.color + '"></div></div>' +
        '<span class="bar-count">' + r.val + '</span>' +
      '</div>';
  });
  if (!rows.length) card.innerHTML += '<div class="empty" style="padding:20px 0">Sem dados</div>';
  return card;
}

function buildSectorBars(tasks) {
  return (Array.isArray(state.sectors) ? state.sectors : []).map(function(s) {
    return { label: s.name, val: tasks.filter(function(t) { return t.sector === s.id; }).length, color: s.color };
  }).filter(function(r) { return r.val > 0; }).sort(function(a, b) { return b.val - a.val; });
}

function buildProjectBars(tasks) {
  return (Array.isArray(state.projects) ? state.projects : []).map(function(p) {
    return { label: p.name, val: tasks.filter(function(t) { return t.project === p.id; }).length, color: p.color };
  }).filter(function(r) { return r.val > 0; }).sort(function(a, b) { return b.val - a.val; }).slice(0, 6);
}

function buildTimelineCard(tasks) {
  var card = document.createElement('div');
  card.className = 'dash-card';
  card.innerHTML = '<div class="dash-section-title">Próximos 7 Dias</div>';

  var today = new Date();
  today.setHours(0,0,0,0);
  var days = [];
  var DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  var maxCount = 1;

  for (var i = 0; i < 7; i++) {
    var d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + i);
    var count = tasks.filter(function(t) {
      if (!t.date || t.status === 'done') return false;
      var td = new Date(t.date); td.setHours(0,0,0,0);
      return td.getTime() === d.getTime();
    }).length;
    maxCount = Math.max(maxCount, count);
    days.push({ date: d, count: count, isToday: i === 0, dn: DAYS[d.getDay()] });
  }

  var grid = document.createElement('div');
  grid.className = 'timeline-grid';
  var maxBarH = 64;

  days.forEach(function(day) {
    var barH = day.count > 0 ? Math.max(6, Math.round((day.count / maxCount) * maxBarH)) : 3;
    var barColor = day.count === 0 ? 'var(--border2)' : (day.isToday ? 'var(--red)' : '#4a9eff');
    var div = document.createElement('div');
    div.className = 'tl-day' + (day.isToday ? ' tl-today' : '');
    div.innerHTML =
      '<span class="tl-dn">' + day.dn + '</span>' +
      '<span class="tl-num">' + day.date.getDate() + '</span>' +
      '<div class="tl-bar-wrap" style="height:' + (maxBarH + 8) + 'px;align-items:flex-end;display:flex;justify-content:center;">' +
        '<div class="tl-bar" style="height:' + barH + 'px;background:' + barColor + ';width:100%;max-width:36px;border-radius:3px 3px 0 0;opacity:' + (day.count === 0 ? '.25' : '1') + '"></div>' +
      '</div>' +
      '<span class="tl-count">' + (day.count > 0 ? day.count : '—') + '</span>';
    grid.appendChild(div);
  });

  card.appendChild(grid);
  return card;
}

function buildOverdueCard(overdueTasks) {
  var card = document.createElement('div');
  card.className = 'dash-card';
  card.innerHTML = '<div class="dash-section-title">Tarefas Atrasadas' +
    (overdueTasks.length > 0 ? ' <span style="background:var(--red);color:#fff;font-family:JetBrains Mono,monospace;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700">' + overdueTasks.length + '</span>' : '') +
    '</div>';

  var now = new Date();
  var shown = overdueTasks.slice(0, 6);
  if (!shown.length) {
    card.innerHTML += '<div style="text-align:center;padding:32px 0;color:var(--text3);font-size:13px;">✓ Nenhuma tarefa atrasada!</div>';
    return card;
  }
  shown.forEach(function(t) {
    var s = state.sectors.find(function(s) { return s.id === t.sector; });
    var sc = STATUS_COLORS[t.status] || '#888';
    var diffDays = Math.floor((now - new Date(t.date)) / (1000*60*60*24));
    var row = document.createElement('div');
    row.className = 'ov-row';
    row.innerHTML =
      '<div class="ov-bar" style="background:' + sc + '"></div>' +
      '<div class="ov-info">' +
        '<div class="ov-title">' + esc(t.title) + '</div>' +
        '<div class="ov-meta">' + (s ? esc(s.name) + ' · ' : '') + fmtDate(t.date) + '</div>' +
      '</div>' +
      '<span class="ov-days">+' + diffDays + 'd</span>';
    row.addEventListener('click', function() { openEditTask(t.id); });
    card.appendChild(row);
  });
  if (overdueTasks.length > 6) {
    card.innerHTML += '<div style="text-align:center;font-family:JetBrains Mono,monospace;font-size:10px;color:var(--text3);padding-top:10px">+ ' + (overdueTasks.length - 6) + ' mais atrasadas</div>';
  }
  return card;
}

      dateSpan.className = 'lr-date' + (overdue ? ' ov' : '');
      dateSpan.innerHTML =
        '<svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>' +
        fmtDate(t.date);
      // make date clickable
      dateSpan.style.cursor = 'pointer';
      dateSpan.style.textDecoration = 'underline dotted';
      dateSpan.style.textUnderlineOffset = '2px';
      dateSpan.addEventListener('click', function(e) { e.stopPropagation(); openDatePopover(e, t.id); });
      right.appendChild(dateSpan);
      el.appendChild(right);
    }

    el.addEventListener('click', function() { openEditTask(t.id); });
    list.appendChild(el);
  });
}

// ====== TASK MODAL ======
function openNewTask(status, dateStr, projectId) {
  state.editId = null;
  document.getElementById('modalTitle').textContent = 'Nova Tarefa';
  document.getElementById('fTitle').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fStatus').value = status || 'todo';
  document.getElementById('fDate').value = dateStr || '';
  document.getElementById('fRecur').value = '';
  document.getElementById('fRecurEnd').value = '';
  document.getElementById('fRecurEndGroup').style.display = 'none';
  document.getElementById('deleteBtn').classList.add('hidden');
  fillSectorSel(''); fillProjectSel(projectId || '');
  document.getElementById('taskModal').classList.add('open');
  setTimeout(function() { document.getElementById('fTitle').focus(); }, 200);
}

function openEditTask(id) {
  var t = state.tasks.find(function(t){return t.id===id;}); if (!t) return;
  state.editId = id;
  document.getElementById('modalTitle').textContent = 'Editar Tarefa';
  document.getElementById('fTitle').value = t.title;
  document.getElementById('fDesc').value = t.desc || '';
  document.getElementById('fStatus').value = t.status;
  document.getElementById('fDate').value = t.date || '';
  document.getElementById('fRecur').value = t.recur || '';
  document.getElementById('fRecurEnd').value = t.recurEnd || '';
  document.getElementById('fRecurEndGroup').style.display = t.recur ? 'block' : 'none';
  document.getElementById('deleteBtn').classList.remove('hidden');
  fillSectorSel(t.sector); fillProjectSel(t.project);
  document.getElementById('taskModal').classList.add('open');
}

function closeTask() { document.getElementById('taskModal').classList.remove('open'); }

function fillSectorSel(sel) {
  var s = document.getElementById('fSector');
  s.innerHTML = '<option value="">— Sem setor —</option>';
  (Array.isArray(state.sectors) ? state.sectors : []).forEach(function(sec) { s.innerHTML += '<option value="'+sec.id+'"'+(sel===sec.id?' selected':'')+'>'+esc(sec.name)+'</option>'; });
}

function fillProjectSel(sel) {
  var s = document.getElementById('fProject');
  s.innerHTML = '<option value="">— Sem projeto —</option>';
  (Array.isArray(state.projects) ? state.projects : []).forEach(function(p) { s.innerHTML += '<option value="'+p.id+'"'+(sel===p.id?' selected':'')+'>'+esc(p.name)+'</option>'; });
}

function saveTask() {
  var title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('Título obrigatório.', 'error'); return; }
  var recur = document.getElementById('fRecur').value;
  var recurEnd = document.getElementById('fRecurEnd').value;
  var data = {
    title: title,
    desc: document.getElementById('fDesc').value.trim(),
    sector: document.getElementById('fSector').value,
    project: document.getElementById('fProject').value,
    status: document.getElementById('fStatus').value,
    date: document.getElementById('fDate').value,
    recur: recur || '',
    recurEnd: recurEnd || ''
  };
  if (state.editId) {
    var idx = state.tasks.findIndex(function(t){return t.id===state.editId;});
    if (idx !== -1) { Object.assign(state.tasks[idx], data); pushToGcal(state.tasks[idx]); }
  } else {
    var task = Object.assign({ id: 'task_'+Date.now(), gcalId: null, createdAt: new Date().toISOString() }, data);
    state.tasks.push(task); pushToGcal(task);
    // generate recurrences
    if (recur && data.date) {
      var recurDates = generateRecurDates(data.date, recur, recurEnd);
      recurDates.forEach(function(dateStr, i) {
        state.tasks.push(Object.assign({}, data, {
          id: 'task_' + (Date.now() + i + 1),
          gcalId: null,
          createdAt: new Date().toISOString(),
          date: dateStr,
          status: 'todo',
          recurParent: task.id
        }));
      });
    }
  }
  saveState(); closeTask(); renderAll();
  showToast(state.editId ? 'Tarefa atualizada!' : 'Tarefa criada!', 'success');
}

function generateRecurDates(startDate, recur, endDate) {
  var results = [];
  var d = new Date(startDate);
  var end = endDate ? new Date(endDate + 'T23:59') : new Date(d.getFullYear(), d.getMonth() + 12, d.getDate()); // max 1 year
  var max = 52; // safety cap
  for (var i = 0; i < max; i++) {
    if (recur === 'daily')     d.setDate(d.getDate() + 1);
    else if (recur === 'weekly')    d.setDate(d.getDate() + 7);
    else if (recur === 'biweekly') d.setDate(d.getDate() + 14);
    else if (recur === 'monthly')  d.setMonth(d.getMonth() + 1);
    if (d > end) break;
    results.push(d.toISOString().slice(0, 16));
  }
  return results;
}

function deleteTask() {
  if (!state.editId || !confirm('Excluir esta tarefa?')) return;
  state.tasks = state.tasks.filter(function(t){return t.id!==state.editId;});
  saveState(); closeTask(); renderAll(); showToast('Tarefa excluída.');
}

function toggleDone(id) {
  var t = state.tasks.find(function(t){return t.id===id;}); if (!t) return;
  t.status = t.status === 'done' ? 'todo' : 'done';
  saveState(); renderAll();
}

// ====== SETTINGS ======
function openSettings() { renderGcalArea(); renderSectorSettings(); document.getElementById('settingsModal').classList.add('open'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }

function renderGcalArea() {
  var area = document.getElementById('gcalArea');
  if (!area) return;
  if (state.gcal.connected) {
    area.innerHTML =
      '<div class="connected-badge"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Google Agenda conectado</div>' +
      '<div style="display:flex;gap:8px;margin-top:10px;">' +
        '<button class="btn btn-ghost" style="font-size:12px;color:var(--red2)" onclick="disconnectGcal()">Desconectar</button>' +
        '<button class="btn btn-ghost" onclick="syncFromGcal()" style="font-size:12px">&#8635; Sincronizar</button>' +
      '</div>';
    return;
  }
  var apisReady = !!tokenClient;
  area.innerHTML =
    '<div class="gcal-guide">' +
      '<p>Para sincronização bidirecional, configure um <strong>Client ID</strong> OAuth no Google Cloud:</p>' +
      '<div class="step-r"><div class="step-n">1</div><p>Acesse <a href="https://console.cloud.google.com" target="_blank">console.cloud.google.com</a> e crie um projeto.</p></div>' +
      '<div class="step-r"><div class="step-n">2</div><p>Em <em>APIs e Serviços → Biblioteca</em>, ative a <strong>Google Calendar API</strong>.</p></div>' +
      '<div class="step-r"><div class="step-n">3</div><p>Em <em>Credenciais → Criar → ID do cliente OAuth</em>, selecione <strong>Aplicativo da Web</strong> e adicione a URL do site nas origens autorizadas.</p></div>' +
      '<div class="step-r"><div class="step-n">4</div><p>Cole o <strong>Client ID</strong> abaixo e clique em Conectar.</p></div>' +
    '</div>' +
    '<div class="form-g" style="margin-top:14px"><label>Client ID</label>' +
      '<input type="text" id="gcalInput" placeholder="xxxx.apps.googleusercontent.com" value="' + esc(state.gcal.clientId) + '">' +
    '</div>' +
    '<button class="btn btn-primary" id="gcalConnectBtn" onclick="saveAndConnect()" style="margin-top:8px;opacity:' + (apisReady ? '1' : '0.5') + ';pointer-events:' + (apisReady ? 'auto' : 'none') + '">' +
      (apisReady ? '▶ Conectar com Google' : '⏳ Carregando APIs...') +
    '</button>' +
    (!apisReady ? '<div style="font-family:JetBrains Mono,monospace;font-size:10px;color:var(--text3);margin-top:6px;">Aguarde, reabra Config em 3 segundos.</div>' : '');
}

function saveAndConnect() {
  var inp = document.getElementById('gcalInput');
  var cid = inp ? inp.value.trim() : state.gcal.clientId;
  if (!cid) { showToast('Insira o Client ID.', 'error'); return; }
  if (cid !== state.gcal.clientId) {
    state.gcal.clientId = cid;
    saveState();
    // Re-init with new clientId
    tokenClient = null; gapiReady = false; gisReady = false;
    loadGoogleAPIs();
    renderGcalArea(); // show loading state
    return;
  }
  // APIs already loaded — open popup directly (must be synchronous from click)
  connectGcal();
}

function renderSectorSettings() {
  var c = document.getElementById('sectorSettings'); c.innerHTML = '';
  var sectors = Array.isArray(state.sectors) ? state.sectors : [];
  sectors.forEach(function(s, i) {
    var el = document.createElement('div'); el.className = 'sec-edit-row';
    el.innerHTML =
      '<input type="color" value="' + s.color + '" data-i="' + i + '">' +
      '<input type="text" value="' + esc(s.name) + '" data-i="' + i + '">' +
      '<button class="btn-danger" data-i="' + i + '">&#215;</button>';
    el.querySelector('input[type=color]').oninput = function() { state.sectors[+this.dataset.i].color = this.value; };
    el.querySelector('input[type=text]').oninput  = function() { state.sectors[+this.dataset.i].name  = this.value; };
    el.querySelector('.btn-danger').onclick = function() { state.sectors.splice(+this.dataset.i, 1); renderSectorSettings(); };
    c.appendChild(el);
  });
}

function addSector() {
  state.sectors.push({ id: 'sec_'+Date.now(), name: 'Novo Setor', color: '#' + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0') });
  renderSectorSettings();
}

function saveSettings() { saveState(); closeSettings(); renderAll(); showToast('Configurações salvas!', 'success'); }

// ====== PROJECTS ======
var PROJ_COLORS = ['#f43f5e','#8b5cf6','#06b6d4','#84cc16','#f97316','#ec4899','#14b8a6','#3b82f6','#a16207','#be185d'];
var _selectedProjColor = PROJ_COLORS[0];

function promptNewProject() {
  _selectedProjColor = PROJ_COLORS[state.projects.length % PROJ_COLORS.length];
  document.getElementById('projNameInput').value = '';

  // build color swatches
  var picker = document.getElementById('projColorPicker');
  picker.innerHTML = '';
  PROJ_COLORS.forEach(function(c) {
    var sw = document.createElement('div');
    sw.style.cssText = 'width:22px;height:22px;border-radius:50%;background:'+c+';cursor:pointer;transition:all .15s;border:2px solid transparent;flex-shrink:0;';
    if (c === _selectedProjColor) sw.style.borderColor = '#fff';
    sw.addEventListener('click', function() {
      _selectedProjColor = c;
      picker.querySelectorAll('div').forEach(function(d) { d.style.borderColor = 'transparent'; });
      this.style.borderColor = '#fff';
    });
    picker.appendChild(sw);
  });

  document.getElementById('projModal').classList.add('open');
  setTimeout(function() { document.getElementById('projNameInput').focus(); }, 200);
}

function closeProjModal() {
  document.getElementById('projModal').classList.remove('open');
}

function saveNewProject() {
  var name = document.getElementById('projNameInput').value.trim();
  if (!name) { document.getElementById('projNameInput').focus(); return; }
  state.projects.push({ id: 'proj_'+Date.now(), name: name, color: _selectedProjColor });
  saveState(); renderAll(); closeProjModal();
  showToast('Projeto "' + name + '" criado!', 'success');
}

// ====== FILTERS ======
function filterStatus(status, btn) {
  state.filters.status = status;
  Array.prototype.forEach.call(document.querySelectorAll('.chips .chip'), function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderCurrentView();
}

// ====== INLINE DATE POPOVER ======
var _activePopover = null;

function closeDatePopover() {
  if (_activePopover) {
    _activePopover.remove();
    _activePopover = null;
  }
}

function openDatePopover(e, taskId) {
  closeDatePopover();
  var task = state.tasks.find(function(t) { return t.id === taskId; });
  if (!task) return;

  var pop = document.createElement('div');
  pop.className = 'date-popover';
  pop.innerHTML =
    '<label>Data / Prazo</label>' +
    '<input type="datetime-local" id="dpInput" value="' + (task.date || '') + '">' +
    '<div class="date-popover-btns">' +
      '<button class="dp-cancel">Cancelar</button>' +
      (task.date ? '<button class="dp-clear">Limpar</button>' : '') +
      '<button class="dp-save">Salvar</button>' +
    '</div>';

  // position near the click
  var x = e.clientX, y = e.clientY;
  pop.style.left = Math.min(x, window.innerWidth - 260) + 'px';
  pop.style.top = (y + 12) + 'px';

  document.body.appendChild(pop);
  _activePopover = pop;

  pop.querySelector('.dp-cancel').addEventListener('click', closeDatePopover);
  if (task.date) {
    pop.querySelector('.dp-clear').addEventListener('click', function() {
      task.date = '';
      saveState(); renderAll(); closeDatePopover();
      showToast('Prazo removido.', 'success');
    });
  }
  pop.querySelector('.dp-save').addEventListener('click', function() {
    var val = pop.querySelector('#dpInput').value;
    task.date = val || '';
    saveState(); renderAll(); closeDatePopover();
    showToast('Prazo atualizado!', 'success');
  });

  // close on outside click
  setTimeout(function() {
    document.addEventListener('click', function handler(ev) {
      if (!pop.contains(ev.target)) {
        closeDatePopover();
        document.removeEventListener('click', handler);
      }
    });
  }, 50);
}

// ====== HELPERS ======
function fmtDate(str) {
  if (!str) return '';
  var d = new Date(str);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var _tt;
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(_tt); _tt = setTimeout(function(){ el.classList.remove('show'); }, 3200);
}

// Close on overlay click
document.getElementById('taskModal').addEventListener('click', function(e){ if(e.target===this) closeTask(); });
document.getElementById('settingsModal').addEventListener('click', function(e){ if(e.target===this) closeSettings(); });
document.getElementById('projModal').addEventListener('click', function(e){ if(e.target===this) closeProjModal(); });
document.getElementById('projNameInput').addEventListener('keydown', function(e){ if(e.key==='Enter') saveNewProject(); });
document.getElementById('fRecur').addEventListener('change', function() {
  document.getElementById('fRecurEndGroup').style.display = this.value ? 'block' : 'none';
});

// Keyboard shortcuts
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') { closeTask(); closeSettings(); }
  if (e.key === 'n' && document.activeElement.tagName === 'BODY') openNewTask('todo','');
});
// ====== INIT (after all vars/functions defined) ======
loadState();
renderAll();
updateGcalBadge();
updateMobUI();
// Auto-load Google APIs since Client ID is pre-configured
if (state.gcal.clientId) loadGoogleAPIs();
</script>
