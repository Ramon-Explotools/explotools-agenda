<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Explotools — Central de Tarefas</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red:#e8000d; --red2:#ff2030; --red3:rgba(232,0,13,.12); --red4:rgba(232,0,13,.06);
  --bg:#0a0b0d; --bg2:#0f1013;
  --surface:#141519; --surface2:#1a1c22; --surface3:#21242c;
  --border:#23262f; --border2:#2d3040; --border3:#3a3f52;
  --text:#f0f1f4; --text2:#8b8fa8; --text3:#4a4e62;
  --glow:0 0 20px rgba(232,0,13,.3); --glow2:0 0 40px rgba(232,0,13,.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999;}

@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseGreen{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.4)}50%{box-shadow:0 0 0 6px rgba(0,230,118,0)}}

header{
  background:linear-gradient(180deg,#111217 0%,#0f1013 100%);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
  animation:fadeDown .4s ease;
}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);opacity:.35;}

.logo-wrap{display:flex;align-items:center;gap:16px;}
.logo-img{height:30px;filter:brightness(0) invert(1) sepia(1) saturate(5) hue-rotate(330deg);}
.logo-div{width:1px;height:24px;background:var(--border2);}
.logo-sub{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text3);}
.header-right{display:flex;align-items:center;gap:10px;}

.gcal-badge{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:4px;transition:all .2s;}
.gcal-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.gcal-badge.live .dot{background:#00e676;box-shadow:0 0 8px #00e676;animation:pulseGreen 1.5s infinite;}
.gcal-badge.live{color:#00e676;border-color:rgba(0,230,118,.2);}

.btn{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:8px 16px;border-radius:4px;border:none;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.btn-primary{background:var(--red);color:#fff;position:relative;overflow:hidden;}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 60%);}
.btn-primary:hover{background:var(--red2);box-shadow:var(--glow);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--red);color:var(--text);background:var(--red4);}

.app-body{display:flex;flex:1;height:calc(100vh - 64px);overflow:hidden;}

.sidebar{width:252px;min-width:252px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;animation:fadeDown .5s ease .1s both;}
.sb-sec{padding:20px 14px 10px;}
.sb-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;padding-left:6px;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:2px;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;}
.nav-btn:hover{background:var(--surface2);color:var(--text);}
.nav-btn.active{background:var(--red3);color:var(--red2);border:1px solid rgba(232,0,13,.15);}
.nav-btn svg{opacity:.5;flex-shrink:0;}
.nav-btn.active svg{opacity:1;}
.sb-hr{border:none;border-top:1px solid var(--border);margin:8px 0;}

.sector-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--text2);margin-bottom:2px;transition:all .12s;user-select:none;position:relative;}
.sector-row::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:0;background:var(--red);border-radius:1px;transition:height .2s;}
.sector-row.active::before{height:20px;}
.sector-row:hover{background:var(--surface2);color:var(--text);}
.sec-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.etapa-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--text2);margin-bottom:2px;transition:all .12s;user-select:none;position:relative;}
.etapa-row::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:0;border-radius:1px;transition:height .2s;}
.etapa-row.active::before{height:20px;}
.etapa-row:hover{background:var(--surface2);color:var(--text);}
.etapa-pip{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.etapa-label{flex:1;}
.sec-name{flex:1;}
.sec-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);background:var(--surface3);padding:1px 6px;border-radius:2px;}

.proj-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--text2);margin-bottom:2px;transition:all .12s;}
.proj-row:hover{background:var(--surface2);color:var(--text);}
.proj-row.active{background:var(--surface2);color:var(--text);}
.proj-row.proj-done-row{opacity:.45;}
.proj-row.proj-done-row .proj-bar{filter:saturate(0);}
.proj-row-actions{display:flex;align-items:center;gap:4px;margin-left:auto;opacity:0;transition:opacity .15s;}
.proj-row:hover .proj-row-actions{opacity:1;}
.proj-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;transition:color .15s;}
.proj-del:hover{color:var(--red2);}
.proj-done-btn{background:none;border:none;cursor:pointer;padding:0 2px;line-height:1;transition:all .15s;flex-shrink:0;display:flex;align-items:center;}
.proj-done-btn svg{transition:all .15s;}
.proj-done-btn:hover svg{stroke:#00e676;}
.proj-done-btn.done svg{stroke:#00e676;}
.proj-show-done{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);cursor:pointer;padding:4px 10px;letter-spacing:.06em;opacity:.6;transition:opacity .15s;background:none;border:none;width:100%;text-align:left;}
.proj-show-done:hover{opacity:1;color:var(--text2);}
.proj-bar{width:3px;height:16px;border-radius:1px;flex-shrink:0;}
.tc-proj{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);background:var(--surface3);padding:2px 7px;border-radius:2px;letter-spacing:.04em;display:flex;align-items:center;gap:4px;}
.tc-proj-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.tc-overdue{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;font-weight:700;flex-shrink:0;line-height:1;animation:pulseRed 1.8s infinite;}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(232,0,13,.4)}50%{box-shadow:0 0 0 5px rgba(232,0,13,0)}}
.cal-ev-overdue{position:absolute;top:-4px;right:-3px;width:13px;height:13px;border-radius:50%;background:var(--red);color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;}
.cal-ev{position:relative;}
.proj-add-task{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;line-height:1;padding:0 2px;transition:color .15s;opacity:0;flex-shrink:0;}
.proj-row:hover .proj-add-task{opacity:1;}
.proj-add-task:hover{color:var(--red2);}
.recur-badge{font-family:'JetBrains Mono',monospace;font-size:8px;color:#60a5fa;background:#60a5fa15;padding:2px 6px;border-radius:2px;letter-spacing:.04em;display:flex;align-items:center;gap:3px;}

.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;background:var(--bg2);}

.toolbar{padding:12px 24px 0;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;position:sticky;top:0;z-index:10;animation:fadeDown .4s ease .15s both;}
.toolbar-top{display:flex;align-items:center;justify-content:space-between;}
.filter-bar{display:flex;align-items:center;gap:6px;padding-bottom:10px;flex-wrap:wrap;min-height:34px;}
.fb-sep{width:1px;height:18px;background:var(--border2);margin:0 2px;flex-shrink:0;}
.fb-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);flex-shrink:0;}
.fc{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.04em;padding:4px 10px;border-radius:3px;border:1px solid var(--border2);background:none;color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.fc:hover{border-color:var(--border3);color:var(--text2);}
.fc.active{border-color:transparent;color:#fff;}
.fc .fc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.fc-clear{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;border-radius:3px;border:1px solid rgba(232,0,13,.3);background:rgba(232,0,13,.06);color:var(--red2);cursor:pointer;transition:all .15s;letter-spacing:.04em;}
.fc-clear:hover{background:rgba(232,0,13,.15);}
/* LIST VIEW enhanced */
.list-row{background:var(--surface);border:1px solid var(--border);border-left:3px solid transparent;border-radius:5px;padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;}
.list-row:hover{border-color:var(--border2);transform:translateX(2px);background:var(--surface2);}
.lr-main{flex:1;min-width:0;}
.lr-title-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.lr-title{font-size:13px;font-weight:500;color:var(--text);}
.lr-title.done{text-decoration:line-through;color:var(--text3);}
.lr-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.lr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.lr-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px;}
.lr-date.ov{color:var(--red2);}
.lr-status-pip{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.lr-recur{font-family:'JetBrains Mono',monospace;font-size:9px;color:#60a5fa;background:#60a5fa15;padding:1px 5px;border-radius:2px;}
.filter-group{display:flex;align-items:center;gap:4px;}
.filter-sep{width:1px;height:18px;background:var(--border2);flex-shrink:0;margin:0 4px;}
.fchip{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.04em;padding:4px 10px;border-radius:2px;border:1px solid var(--border2);background:none;color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.fchip:hover{border-color:var(--border3);color:var(--text2);}
.fchip.active{background:var(--red3);border-color:rgba(232,0,13,.3);color:var(--red2);}
.fchip.active-green{background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.25);color:#00e676;}
.fchip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.filter-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
.filter-clear{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;padding:4px 8px;border-radius:2px;border:none;background:none;color:var(--text3);cursor:pointer;margin-left:4px;transition:color .15s;}
.filter-clear:hover{color:var(--red2);}
.list-view{display:flex;flex-direction:column;gap:5px;}
.list-row{background:var(--surface);border:1px solid var(--border);border-left:3px solid transparent;border-radius:5px;padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;}
.list-row:hover{border-color:var(--border2);transform:translateX(3px);background:var(--surface2);}
.list-row-main{flex:1;min-width:0;}
.list-row-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.list-row-title-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.list-row-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.list-row-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.page-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;letter-spacing:.04em;text-transform:uppercase;}
.chips{display:flex;gap:6px;}
.chip{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 12px;border-radius:2px;border:1px solid var(--border2);color:var(--text3);cursor:pointer;background:none;letter-spacing:.04em;transition:all .15s;}
.chip:hover{border-color:var(--border3);color:var(--text2);}
.chip.active{background:var(--red3);border-color:rgba(232,0,13,.3);color:var(--red2);}

.view-wrap{flex:1;padding:24px;overflow-x:hidden;animation:fadeUp .4s ease .2s both;}
.view-wrap.kanban-wrap{overflow-x:auto;}

/* KANBAN */
.kanban{display:flex;gap:14px;align-items:flex-start;min-height:100%;}
.kb-col{min-width:272px;width:272px;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0;}
.kb-hd{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);position:relative;}
.kb-hd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.col-todo .kb-hd::before{background:#4a9eff;}
.col-doing .kb-hd::before{background:var(--red);}
.col-waiting .kb-hd::before{background:#f59e0b;}
.col-done .kb-hd::before{background:#00e676;}
.kb-title{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text2);}
.kb-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);background:var(--bg);padding:2px 8px;border-radius:10px;border:1px solid var(--border);}
.kb-cards{padding:10px;display:flex;flex-direction:column;gap:7px;min-height:60px;}

.task-card{background:var(--surface2);border:1px solid var(--border);border-left:3px solid transparent;border-radius:5px;padding:12px;cursor:grab;transition:all .18s;animation:slideIn .22s ease;position:relative;user-select:none;}
.task-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4);}
.task-card.dragging{opacity:.4;cursor:grabbing;transform:scale(.97);}
.task-card.drag-over{border-color:var(--red);box-shadow:0 0 0 2px rgba(232,0,13,.2);}
.kb-cards.drag-over-col{background:rgba(232,0,13,.04);border-radius:4px;}
.tc-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:8px;color:var(--text);}
.tc-date-row{display:flex;align-items:center;gap:4px;margin-bottom:8px;}
.tc-date-icon{opacity:.4;flex-shrink:0;}
.tc-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);}
.tc-date.ov{color:var(--red2);}
.tc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.tag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:2px;letter-spacing:.04em;text-transform:uppercase;font-weight:500;}
.tc-actions{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);}
.tc-status-row{display:flex;align-items:center;gap:5px;}
.tc-sector-row{display:flex;align-items:center;gap:4px;}
.status-dot{width:10px;height:10px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s;flex-shrink:0;position:relative;}
.status-dot:hover{transform:scale(1.3);}
.status-dot.active{border-color:rgba(255,255,255,.5);box-shadow:0 0 0 2px rgba(255,255,255,.2);}
.status-dot[data-s="todo"]{background:#4a9eff;}
.status-dot[data-s="doing"]{background:var(--red);}
.status-dot[data-s="waiting"]{background:#f59e0b;}
.status-dot[data-s="done"]{background:#00e676;}
.sector-pip{width:8px;height:8px;border-radius:2px;cursor:pointer;transition:all .15s;flex-shrink:0;opacity:.45;}
.sector-pip:hover{opacity:1;transform:scale(1.25);}
.sector-pip.active{opacity:1;box-shadow:0 0 0 2px rgba(255,255,255,.25);}
.tc-actions-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;margin-right:2px;}

.kb-add{margin:0 10px 10px;width:calc(100% - 20px);padding:8px;border-radius:4px;border:1px dashed var(--border2);background:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.kb-add:hover{border-color:var(--red);color:var(--red2);background:var(--red4);}

/* CALENDAR */
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.cal-hd{padding:12px 20px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border);background:var(--surface2);}
.cal-hd-row{display:flex;align-items:center;justify-content:space-between;}
.cal-month{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:20px;letter-spacing:.06em;text-transform:uppercase;}
.cal-nav{display:flex;gap:6px;}
.cal-subviews{display:flex;gap:4px;}
.cal-sv{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:4px 12px;border-radius:2px;border:1px solid var(--border2);background:none;color:var(--text3);cursor:pointer;transition:all .15s;}
.cal-sv:hover{border-color:var(--border3);color:var(--text2);}
.cal-sv.active{background:var(--red3);border-color:rgba(232,0,13,.3);color:var(--red2);}
.cal-done-toggle{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:4px 10px;border-radius:2px;border:1px solid var(--border2);background:none;color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.cal-done-toggle:hover{border-color:var(--border3);color:var(--text2);}
.cal-done-toggle.active{background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.25);color:#00e676;}
/* INLINE DATE PICKER */
.date-popover{position:fixed;z-index:600;background:var(--surface);border:1px solid var(--border2);border-top:2px solid var(--red);border-radius:6px;box-shadow:0 16px 40px rgba(0,0,0,.55);padding:14px;animation:fadeDown .15s ease;min-width:220px;}
.date-popover label{display:block;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;}
.date-popover input[type=datetime-local]{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:8px 10px;color:var(--text);font-size:12px;font-family:'Inter',sans-serif;outline:none;width:100%;box-sizing:border-box;}
.date-popover input[type=datetime-local]:focus{border-color:var(--red);}
.date-popover-btns{display:flex;gap:6px;margin-top:10px;justify-content:flex-end;}
.date-popover-btns button{font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 12px;border-radius:3px;cursor:pointer;border:1px solid transparent;letter-spacing:.04em;transition:all .15s;}
.dp-cancel{background:var(--surface3);color:var(--text2);border-color:var(--border2);}
.dp-cancel:hover{border-color:var(--border3);}
.dp-clear{background:rgba(232,0,13,.08);color:var(--red2);border-color:rgba(232,0,13,.2);}
.dp-clear:hover{background:rgba(232,0,13,.15);}
.dp-save{background:var(--red);color:#fff;}
.dp-save:hover{background:var(--red2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-dow{padding:10px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--surface2);}
.cal-day{min-height:96px;padding:8px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.cal-day:hover{background:var(--surface2);}
.cal-day:nth-child(7n){border-right:none;}
.cal-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:3px;margin-bottom:4px;}
.cal-day.today .cal-num{background:var(--red);color:#fff;font-weight:700;}
.cal-day.other{opacity:.25;}
.cal-ev{font-size:10px;padding:3px 7px 3px 6px;border-radius:3px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:flex;align-items:center;gap:5px;position:relative;}
.cal-ev-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cal-ev-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;opacity:.85;}
.cal-daily-task{background:var(--surface);border:1px solid var(--border);border-left:3px solid transparent;border-radius:5px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px;position:relative;}
.cal-daily-task:hover{border-color:var(--border2);transform:translateX(2px);}
.cal-daily-sector-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;position:absolute;top:10px;right:12px;}

/* WEEKLY VIEW */
.cal-week-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));min-height:300px;width:100%;}
.cal-week-col{border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.cal-week-col:last-child{border-right:none;}
.cal-week-hd{padding:10px 4px;text-align:center;border-bottom:1px solid var(--border);background:var(--surface2);}
.cal-week-dn{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;}
.cal-week-num{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--text2);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:4px auto 0;}
.cal-week-num.today{background:var(--red);color:#fff;}
.cal-week-body{flex:1;padding:4px;cursor:pointer;min-height:120px;min-width:0;overflow:hidden;}
.cal-week-body:hover{background:var(--surface2);}

/* DAILY VIEW */
.cal-daily{display:flex;flex-direction:column;height:100%;}
.cal-daily-hd{padding:14px 20px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.cal-daily-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);}
.cal-daily-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;}

/* All-day strip */
.cal-allday{border-bottom:2px solid var(--border2);background:var(--surface2);padding:8px 0 8px 56px;min-height:36px;position:relative;flex-shrink:0;}
.cal-allday-label{position:absolute;left:0;top:8px;width:52px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);text-align:right;padding-right:10px;}
.cal-allday-tasks{display:flex;flex-wrap:wrap;gap:4px;padding-right:12px;}
.cal-allday-chip{font-size:10px;padding:3px 8px;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:5px;border-left:3px solid transparent;background:var(--surface);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:all .15s;max-width:220px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.cal-allday-chip:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.3);}
.cal-allday-empty{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);opacity:.5;}

/* Time grid */
.cal-timegrid{flex:1;position:relative;display:flex;flex-direction:column;}
.cal-timegrid-scroll{flex:1;overflow-y:auto;position:relative;}
.cal-tg-inner{position:relative;min-height:1440px;} /* 24h × 60px */
.cal-tg-hour{position:absolute;left:0;right:0;display:flex;align-items:flex-start;}
.cal-tg-hour-label{width:52px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);text-align:right;padding-right:10px;margin-top:-7px;flex-shrink:0;letter-spacing:.04em;}
.cal-tg-hour-line{flex:1;border-top:1px solid var(--border);position:relative;}
.cal-tg-halfline{position:absolute;top:30px;left:0;right:0;border-top:1px dashed var(--border);opacity:.4;}
.cal-tg-event{position:absolute;left:4px;right:4px;border-radius:4px;padding:4px 8px;cursor:pointer;overflow:hidden;border-left:3px solid transparent;transition:all .15s;min-height:22px;display:flex;flex-direction:column;justify-content:center;z-index:1;}
.cal-tg-event:hover{filter:brightness(1.15);transform:translateX(2px);z-index:2;}
.cal-tg-event-title{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.cal-tg-event-meta{font-family:'JetBrains Mono',monospace;font-size:9px;opacity:.7;margin-top:1px;}
.cal-tg-event-badge{position:absolute;top:3px;right:4px;width:12px;height:12px;border-radius:50%;background:var(--red);color:#fff;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* Now line */
.cal-now-line{position:absolute;left:52px;right:0;height:2px;background:var(--red);z-index:3;pointer-events:none;}
.cal-now-dot{position:absolute;left:-5px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--red);}

/* Hour click zone */
.cal-tg-click{position:absolute;left:52px;right:0;cursor:pointer;opacity:0;transition:opacity .12s;}
.cal-tg-click:hover{opacity:1;background:rgba(232,0,13,.04);border-radius:2px;}

/* DASHBOARD */
.dash{display:flex;flex-direction:column;gap:24px;}
.dash-section-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.dash-section-title::before{content:'';width:3px;height:14px;background:var(--red);border-radius:1px;}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s;}
.kpi-card:hover{border-color:var(--border3);}
.kpi-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.kpi-card.kc-blue::after{background:#4a9eff;}
.kpi-card.kc-red::after{background:var(--red);}
.kpi-card.kc-yellow::after{background:#f59e0b;}
.kpi-card.kc-green::after{background:#00e676;}
.kpi-card.kc-purple::after{background:#a855f7;}
.kpi-card.kc-cyan::after{background:#06b6d4;}
.kpi-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.kpi-value{font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;line-height:1;color:var(--text);}
.kpi-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-top:6px;}
.kpi-badge{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:2px;margin-top:6px;}
.kpi-badge.bad{background:rgba(232,0,13,.12);color:var(--red2);}
.kpi-badge.good{background:rgba(0,230,118,.1);color:#00e676;}

/* Charts row */
.dash-charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.dash-charts-row-2{display:grid;grid-template-columns:2fr 1fr;gap:16px;}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px 22px;}

/* SVG Charts */
.chart-donut-wrap{display:flex;align-items:center;gap:24px;}
.chart-legend{display:flex;flex-direction:column;gap:8px;flex:1;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.legend-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-left:auto;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-row:last-child{margin-bottom:0;}
.bar-lbl{font-size:11px;color:var(--text2);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease;}
.bar-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);width:28px;text-align:right;flex-shrink:0;}

/* Timeline */
.timeline-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.tl-day{display:flex;flex-direction:column;align-items:center;gap:6px;}
.tl-dn{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);}
.tl-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);}
.tl-bar-wrap{width:100%;display:flex;justify-content:center;}
.tl-bar{width:28px;border-radius:3px 3px 0 0;min-height:3px;transition:height .4s ease;}
.tl-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);}
.tl-today .tl-num{background:var(--red);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.tl-today .tl-dn{color:var(--red2);}

/* Overdue list */
.ov-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all .12s;}
.ov-row:last-child{border-bottom:none;}
.ov-row:hover{padding-left:4px;}
.ov-bar{width:3px;height:30px;border-radius:1px;flex-shrink:0;}
.ov-info{flex:1;min-width:0;}
.ov-title{font-size:12px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ov-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-top:3px;}
.ov-days{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--red2);font-weight:700;flex-shrink:0;}

/* LIST */
.list-view{display:flex;flex-direction:column;gap:6px;}
.list-row{background:var(--surface);border:1px solid var(--border);border-left:3px solid transparent;border-radius:5px;padding:13px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;}
.list-row:hover{border-color:var(--border2);transform:translateX(3px);background:var(--surface2);}
.check-btn{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.check-btn:hover{border-color:var(--red);}
.check-btn.done{background:#00e676;border-color:#00e676;}
.lr-title{flex:1;font-size:13px;font-weight:500;}
.lr-title.done{text-decoration:line-through;color:var(--text3);}
.lr-right{display:flex;align-items:center;gap:8px;}

/* EMPTY */
.empty{padding:32px 16px;text-align:center;color:var(--text3);font-size:12px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border2);border-top:2px solid var(--red);border-radius:6px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;transform:translateY(24px) scale(.98);transition:transform .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 32px 80px rgba(0,0,0,.6),var(--glow2);}
.overlay.open .modal{transform:translateY(0) scale(1);}
.modal-hd{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;letter-spacing:.06em;text-transform:uppercase;}
.modal-x{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;line-height:1;transition:all .15s;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px;}
.modal-x:hover{color:var(--text);background:var(--surface2);transform:rotate(90deg);}
.modal-body{padding:24px;}
.modal-ft{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.form-g{margin-bottom:18px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:7px;letter-spacing:.1em;text-transform:uppercase;}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s,box-shadow .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--red);box-shadow:0 0 0 2px rgba(232,0,13,.15);}
select option{background:var(--surface2);}
textarea{resize:vertical;min-height:80px;}

/* SETTINGS */
.settings-sec{margin-bottom:28px;}
.settings-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:8px;}
.settings-title::before{content:'';width:3px;height:16px;background:var(--red);border-radius:1px;}
.sec-edit-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;background:var(--surface2);padding:10px 12px;border-radius:4px;border:1px solid var(--border);}
.sec-edit-row input[type="text"]{flex:1;border:none;background:transparent;padding:4px 0;border-bottom:1px solid var(--border2);border-radius:0;font-size:13px;}
.sec-edit-row input[type="color"]{width:32px;height:32px;padding:3px;border-radius:4px;cursor:pointer;flex-shrink:0;border:1px solid var(--border2);}
.gcal-guide{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:18px;}
.gcal-guide p{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.7;}
.step-r{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start;}
.step-n{width:22px;height:22px;border-radius:3px;background:var(--red);color:#fff;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-r p{font-size:13px;color:var(--text2);line-height:1.6;}
.step-r a{color:var(--red2);text-decoration:none;}
.step-r a:hover{text-decoration:underline;}
code{background:var(--surface3);padding:1px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#f97316;}
.connected-badge{display:flex;align-items:center;gap:8px;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);color:#00e676;padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:12px;}

.btn-danger{background:rgba(232,0,13,.1);border:1px solid rgba(232,0,13,.2);color:var(--red2);font-size:12px;padding:5px 10px;border-radius:4px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.04em;transition:all .15s;}
.btn-danger:hover{background:rgba(232,0,13,.2);}

.toast{position:fixed;bottom:28px;right:28px;background:var(--surface2);border:1px solid var(--border2);padding:13px 20px;border-radius:5px;font-size:13px;color:var(--text);box-shadow:0 12px 32px rgba(0,0,0,.5);z-index:9000;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:10px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-left:3px solid #00e676;}
.toast.error{border-left:3px solid var(--red);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.hidden{display:none!important;}
/* ============================================================
   MOBILE — max-width: 768px
   ============================================================ */

/* ── Bottom Nav ── */
.mob-nav{display:none;}
.mob-drawer-overlay{display:none;}
.mob-filter-btn{display:none;}

@media (max-width: 768px) {

  /* Reset body height for mobile scroll */
  body{overflow-y:auto;}

  /* Header compact */
  header{padding:0 14px;height:52px;}
  .logo-text{font-size:16px;}
  .logo-sub{display:none;}
  .gcal-badge span#gcalTxt{display:none;}
  .gcal-badge{padding:6px 8px;}
  .btn.btn-ghost{font-size:11px;padding:6px 8px;}
  .btn.btn-primary{font-size:11px;padding:6px 10px;}
  .btn.btn-primary svg{display:none;}

  /* Hide desktop sidebar */
  .sidebar{display:none;}

  /* App body full width, no height lock */
  .app-body{height:auto;min-height:calc(100vh - 52px);flex-direction:column;}

  /* Main takes full width, bottom padding for nav */
  .main{width:100%;padding-bottom:64px;}

  /* Toolbar compact */
  .toolbar{padding:10px 14px 0;}
  .toolbar-top{flex-wrap:wrap;gap:8px;}
  .page-title{font-size:16px;}
  .chips{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{font-size:10px;padding:4px 10px;white-space:nowrap;}

  /* Filter bar horizontal scroll */
  .filter-bar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:8px;}
  .filter-bar::-webkit-scrollbar{display:none;}
  .fb-sep{display:none;}
  .fb-label{display:none;}
  .fc{font-size:10px;padding:4px 9px;white-space:nowrap;}

  /* View wrap */
  .view-wrap{padding:12px 10px;overflow-x:hidden;}

  /* ── Kanban horizontal scroll ── */
  .kanban{flex-direction:row;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:10px;padding-bottom:8px;align-items:flex-start;scroll-snap-type:x mandatory;}
  .kb-col{min-width:82vw;width:82vw;scroll-snap-align:start;flex-shrink:0;}

  /* ── Task Card compact ── */
  .tc-actions{flex-wrap:wrap;gap:6px;}
  .tc-actions-lbl{font-size:7px;}
  .status-dot{width:12px;height:12px;}
  .sector-pip{width:10px;height:10px;}

  /* ── List view ── */
  .list-row{padding:10px 12px;}
  .lr-main{min-width:0;}
  .lr-title{font-size:12px;}
  .lr-meta{gap:4px;}
  .lr-right{flex-shrink:0;}

  /* ── Calendar compact ── */
  .cal-hd{padding:10px 12px;gap:8px;}
  .cal-month{font-size:15px;}
  .cal-day{min-height:52px;padding:5px;}
  .cal-ev{font-size:9px;padding:1px 4px;}
  .cal-ev-title{font-size:9px;}
  .cal-week-col{min-width:0;}
  .cal-week-hd{padding:6px 4px;}
  .cal-week-dn{font-size:8px;}
  .cal-week-num{font-size:13px;width:24px;height:24px;}
  .cal-done-toggle{font-size:9px;padding:3px 7px;}
  .cal-subviews{gap:3px;}
  .cal-sv{font-size:9px;padding:3px 8px;}
  .cal-daily{padding:12px 10px;}

  /* ── Dashboard ── */
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px;}
  .kpi-card{padding:12px 14px;}
  .kpi-value{font-size:24px;}
  .kpi-label{font-size:8px;}
  .dash-charts-row{grid-template-columns:1fr;gap:12px;}
  .dash-charts-row-2{grid-template-columns:1fr;gap:12px;}
  .dash-card{padding:14px 14px;}
  .chart-donut-wrap{flex-direction:column;align-items:flex-start;gap:14px;}
  .timeline-grid{grid-template-columns:repeat(7,1fr);gap:3px;}
  .tl-dn{font-size:8px;}
  .tl-bar{width:100%;}

  /* ── Modals full screen ── */
  .overlay{align-items:flex-end;}
  .modal{
    width:100% !important;
    max-width:100% !important;
    max-height:92vh;
    border-radius:14px 14px 0 0;
    border-left:none;border-right:none;border-bottom:none;
    transform:translateY(100%);
  }
  .overlay.open .modal{transform:translateY(0);border-radius:14px 14px 0 0;}
  .modal-body{padding:16px;}
  .modal-hd{padding:14px 16px;}
  .modal-ft{padding:12px 16px;}
  .form-row{grid-template-columns:1fr;}

  /* ── Mobile Bottom Navigation ── */
  .mob-nav{
    display:flex;
    position:fixed;
    bottom:0;left:0;right:0;
    height:60px;
    background:var(--surface);
    border-top:1px solid var(--border);
    z-index:200;
    align-items:stretch;
    box-shadow:0 -8px 24px rgba(0,0,0,.4);
  }
  .mob-nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;background:none;border:none;cursor:pointer;
    color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:9px;
    letter-spacing:.04em;text-transform:uppercase;transition:color .15s;
    padding:0;position:relative;
  }
  .mob-nav-btn.active{color:var(--red2);}
  .mob-nav-btn.active svg{stroke:var(--red2);}
  .mob-nav-btn svg{opacity:.6;transition:opacity .15s;}
  .mob-nav-btn.active svg{opacity:1;}
  .mob-nav-btn.mob-add{color:var(--text);}
  .mob-nav-add-ring{
    width:42px;height:42px;border-radius:50%;
    background:var(--red);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 16px rgba(232,0,13,.45);
    margin-bottom:2px;
  }

  /* ── Mobile Drawer (Filtros/Projetos) ── */
  .mob-drawer-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;
    opacity:0;transition:opacity .2s;
  }
  .mob-drawer-overlay.open{display:flex;opacity:1;}
  .mob-drawer{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--surface);border-radius:16px 16px 0 0;
    padding:0 0 80px;max-height:80vh;overflow-y:auto;
    transform:translateY(100%);transition:transform .28s cubic-bezier(.32,1.04,.6,1);
    z-index:301;
  }
  .mob-drawer-overlay.open .mob-drawer{transform:translateY(0);}
  .mob-drawer-hd{
    padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);
  }
  .mob-drawer-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;letter-spacing:.06em;text-transform:uppercase;}
  .mob-drawer-x{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;line-height:1;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
  .mob-drawer-body{padding:12px 16px;}
  .mob-drawer-sec{margin-bottom:18px;}
  .mob-drawer-sec-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;padding-left:4px;}

  /* Touch targets bigger */
  .check-btn{width:22px;height:22px;}
  .status-dot{width:14px;height:14px;}
}
</style>
</head>

  <div class="modal">

      <div class="settings-sec">

      </div>

      <button class="btn btn-primary" onclick="saveNewProject()">Criar Projeto</button>

<script>
// ====== STATE ======
var state = {
  tasks: [],
  projects: [],
  sectors: [
    { id: 'ops', name: 'Operações / Logística', color: '#3b82f6' },
    { id: 'fin', name: 'Financeiro / Admin',    color: '#10b981' },
    { id: 'mkt', name: 'Marketing / Comercial', color: '#f59e0b' },
    { id: 'pes', name: 'Pessoal / Particular',  color: '#a855f7' }
  ],
  gcal: { clientId: '37409057734-2pbe7fvrbhh127l1t0kfsf1sb4qo8r3h.apps.googleusercontent.com', connected: false, token: null, tokenExpiry: null },
  filters: { status: 'all', sector: null, project: null, overdue: false, dateRange: null },
  view: 'kanban',
  editId: null,
  calDate: new Date(),
  calSubView: 'monthly',
  calShowDone: false,
  showDoneProjects: false
};

function loadState() {
  try {
    var s = localStorage.getItem('explo_v2');
    if (s) {
      var p = JSON.parse(s);
      if (p && typeof p === 'object') {
        if (Array.isArray(p.tasks))    state.tasks    = p.tasks;
        if (Array.isArray(p.projects)) state.projects = p.projects;
        if (Array.isArray(p.sectors) && p.sectors.length > 0) state.sectors = p.sectors;
        if (p.gcal && typeof p.gcal === 'object') {
          state.gcal = {
            clientId:    p.gcal.clientId    || '',
            connected:   !!p.gcal.connected,
            token:       p.gcal.token       || null,
            tokenExpiry: p.gcal.tokenExpiry || null
          };
        }
        if (p.calSubView) state.calSubView = p.calSubView;
        if (typeof p.calShowDone === 'boolean') state.calShowDone = p.calShowDone;
        if (typeof p.showDoneProjects === 'boolean') state.showDoneProjects = p.showDoneProjects;
      }
    }
  } catch(e) { console.warn('loadState:', e); }
}

function saveState() {
  try { localStorage.setItem('explo_v2', JSON.stringify({ tasks: state.tasks, projects: state.projects, sectors: state.sectors, gcal: state.gcal, calSubView: state.calSubView, calShowDone: state.calShowDone, showDoneProjects: state.showDoneProjects })); } catch(e) {}
}

// init called at end of script

// ====== GOOGLE CALENDAR ======
var gapiReady = false, gisReady = false, tokenClient;

function loadGoogleAPIs() {
  if (!state.gcal.clientId) return;
  var s1 = document.createElement('script');
  s1.src = 'https://apis.google.com/js/api.js';
  s1.onload = function() {
    gapi.load('client', function() {
      gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'] }).then(function() {
        gapiReady = true;
        if (gisReady) initGIS();
      }).catch(function() { gapiReady = true; if (gisReady) initGIS(); });
    });
  };
  document.body.appendChild(s1);
  var s2 = document.createElement('script');
  s2.src = 'https://accounts.google.com/gsi/client';
  s2.onload = function() { gisReady = true; if (gapiReady) initGIS(); };
  document.body.appendChild(s2);
}

function initGIS() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: state.gcal.clientId,
    scope: 'https://www.googleapis.com/auth/calendar',
    callback: function(r) {
      if (r.error) {
        showToast('Erro OAuth: ' + r.error, 'error');
        state.gcal.connected = false; state.gcal.token = null;
        saveState(); updateGcalBadge(); renderGcalArea();
        return;
      }
      state.gcal.connected = true;
      state.gcal.token = r.access_token;
      state.gcal.tokenExpiry = Date.now() + 3500 * 1000; // ~58 min
      saveState(); updateGcalBadge();
      if (typeof renderGcalArea === 'function') renderGcalArea();
      showToast('Google Agenda conectado!', 'success');
      syncFromGcal();
    }
  });
  // Restore token only if not expired
  if (state.gcal.token && state.gcal.tokenExpiry && Date.now() < state.gcal.tokenExpiry) {
    gapi.client.setToken({ access_token: state.gcal.token });
  } else if (state.gcal.token) {
    state.gcal.token = null;
    state.gcal.connected = false;
    state.gcal.tokenExpiry = null;
    saveState(); updateGcalBadge();
  }
  // Auto-update button if settings modal is open
  if (document.getElementById('settingsModal') && document.getElementById('settingsModal').classList.contains('open')) {
    renderGcalArea();
  }
}

function connectGcal() {
  if (!state.gcal.clientId) { showToast('Configure o Client ID primeiro.', 'error'); return; }
  if (!tokenClient) { showToast('APIs ainda carregando, tente em 3 segundos.', 'error'); return; }
  // Direct user gesture — popup will open
  try {
    tokenClient.requestAccessToken({ prompt: 'select_account' });
  } catch(e) {
    showToast('Erro ao abrir login: ' + e.message, 'error');
  }
}

function disconnectGcal() {
  if (state.gcal.token) {
    try { google.accounts.oauth2.revoke(state.gcal.token); } catch(e) {}
  }
  state.gcal.connected = false; state.gcal.token = null; state.gcal.tokenExpiry = null;
  saveState(); updateGcalBadge();
  if (typeof renderGcalArea === 'function') renderGcalArea();
  showToast('Desconectado.');
}

function updateGcalBadge() {
  var b = document.getElementById('gcalBadge');
  var t = document.getElementById('gcalTxt');
  if (state.gcal.connected) { b.classList.add('live'); t.textContent = 'Agenda: online'; }
  else { b.classList.remove('live'); t.textContent = 'Agenda: offline'; }
}

function syncFromGcal() {
  if (!state.gcal.connected || !gapiReady) return;
  var now = new Date();
  gapi.client.calendar.events.list({
    calendarId: 'primary',
    timeMin: new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString(),
    timeMax: new Date(now.getFullYear(), now.getMonth()+3, 1).toISOString(),
    singleEvents: true, orderBy: 'startTime'
  }).then(function(r) {
    var added = 0;
    (r.result.items || []).forEach(function(ev) {
      if (!state.tasks.find(function(t) { return t.gcalId === ev.id; })) {
        var start = ev.start && (ev.start.dateTime || ev.start.date);
        state.tasks.push({ id: 'gcal_' + ev.id, gcalId: ev.id, title: ev.summary || '(sem título)', desc: ev.description || '', sector: '', project: '', status: 'todo', date: start ? new Date(start).toISOString().slice(0,16) : '', createdAt: new Date().toISOString() });
        added++;
      }
    });
    saveState(); renderAll();
    if (added > 0) showToast(added + ' evento(s) importados.', 'success');
  }).catch(function(e) { showToast('Erro ao sincronizar.', 'error'); });
}

function pushToGcal(task) {
  if (!state.gcal.connected || !gapiReady) return;
  var ev = { summary: task.title, description: task.desc || '' };
  if (task.date) {
    var d = new Date(task.date);
    ev.start = { dateTime: d.toISOString(), timeZone: 'America/Sao_Paulo' };
    ev.end   = { dateTime: new Date(d.getTime() + 3600000).toISOString(), timeZone: 'America/Sao_Paulo' };
  } else { var td = new Date().toISOString().split('T')[0]; ev.start = { date: td }; ev.end = { date: td }; }
  var req = task.gcalId
    ? gapi.client.calendar.events.update({ calendarId: 'primary', eventId: task.gcalId, resource: ev })
    : gapi.client.calendar.events.insert({ calendarId: 'primary', resource: ev });
  req.then(function(r) {
    if (!task.gcalId) task.gcalId = r.result.id;
    showToast('Sincronizado com Google Agenda ✓', 'success');
  }).catch(function() {});
}

if (state.gcal.clientId) loadGoogleAPIs();

// ====== VIEWS ======
function switchView(v) {
  state.view = v;
  ['kanban','calendar','list','dashboard'].forEach(function(n) {
    var vb  = document.getElementById('vbtn-' + n);
    var vw  = document.getElementById(n + 'View');
    var mvb = document.getElementById('mvbtn-' + n);
    if (vb)  vb.classList.toggle('active', n === v);
    if (vw)  vw.classList.toggle('hidden', n !== v);
    if (mvb) mvb.classList.toggle('active', n === v);
  });
  // Kanban needs horizontal scroll; other views don't
  var wrap = document.querySelector('.view-wrap');
  if (wrap) wrap.classList.toggle('kanban-wrap', v === 'kanban');
  var titles = { kanban: 'Kanban', calendar: 'Calendário', list: 'Lista', dashboard: 'Dashboard' };
  document.getElementById('pageTitle').textContent = titles[v] || v;
  renderCurrentView();
}

// ── Mobile drawer ──
function openMobDrawer() {
  renderMobDrawer();
  document.getElementById('mobDrawerOverlay').classList.add('open');
}
function closeMobDrawer() {
  document.getElementById('mobDrawerOverlay').classList.remove('open');
}

function renderMobDrawer() {
  // Etapas
  var ef = document.getElementById('mobEtapaFilters');
  ef.innerHTML = '';
  COLS.forEach(function(col) {
    var c = STATUS_COLORS[col.id];
    var active = state.filters.status === col.id;
    var btn = document.createElement('button');
    btn.style.cssText = 'display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border-radius:4px;border:none;background:' + (active ? c+'22' : 'none') + ';color:' + (active ? c : 'var(--text2)') + ';cursor:pointer;font-size:13px;font-family:Inter,sans-serif;margin-bottom:2px;';
    btn.innerHTML = '<span style="width:10px;height:10px;border-radius:50%;background:' + c + ';flex-shrink:0;display:inline-block"></span>' + col.label;
    btn.addEventListener('click', function() {
      state.filters.status = active ? 'all' : col.id;
      document.querySelectorAll('.chips .chip').forEach(function(b) { b.classList.remove('active'); });
      var chip = document.getElementById('chip-' + (active ? 'all' : col.id));
      if (chip) chip.classList.add('active');
      renderAll(); closeMobDrawer();
    });
    ef.appendChild(btn);
  });

  // Setores
  var sf = document.getElementById('mobSectorFilters');
  sf.innerHTML = '';
  (Array.isArray(state.sectors) ? state.sectors : []).forEach(function(s) {
    var active = state.filters.sector === s.id;
    var btn = document.createElement('button');
    btn.style.cssText = 'display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border-radius:4px;border:none;background:' + (active ? s.color+'22' : 'none') + ';color:' + (active ? s.color : 'var(--text2)') + ';cursor:pointer;font-size:13px;font-family:Inter,sans-serif;margin-bottom:2px;';
    btn.innerHTML = '<span style="width:10px;height:10px;border-radius:3px;background:' + s.color + ';flex-shrink:0;display:inline-block"></span>' + esc(s.name);
    btn.addEventListener('click', function() {
      state.filters.sector = active ? null : s.id;
      renderAll(); closeMobDrawer();
    });
    sf.appendChild(btn);
  });

  // Período
  var pf = document.getElementById('mobPeriodFilters');
  pf.innerHTML = '';
  [{ id:'today',label:'Hoje' },{ id:'week',label:'Esta semana' },{ id:'month',label:'Este mês' }].forEach(function(opt) {
    var active = state.filters.dateRange === opt.id;
    var btn = document.createElement('button');
    btn.className = 'fc' + (active ? ' active' : '');
    if (active) btn.style.cssText = 'background:#334155;color:#e2e8f0;border-color:#475569;';
    btn.textContent = opt.label;
    btn.style.fontSize = '12px';
    btn.addEventListener('click', function() {
      state.filters.dateRange = active ? null : opt.id;
      renderAll(); closeMobDrawer();
    });
    pf.appendChild(btn);
  });

  // Projetos — reutiliza a função de sidebar
  var pl = document.getElementById('mobProjectList');
  var desktopPl = document.getElementById('projectList');
  pl.innerHTML = desktopPl ? desktopPl.innerHTML : '';
}

// Show/hide mob filter btn based on viewport
function updateMobUI() {
  var isMob = window.innerWidth <= 768;
  var filterBtn = document.querySelector('.mob-filter-btn');
  if (filterBtn) filterBtn.style.display = isMob ? 'flex' : 'none';
  var chips = document.querySelector('.chips');
  if (chips) chips.style.display = isMob ? 'none' : 'flex';
}
window.addEventListener('resize', updateMobUI);


function renderAll() { renderSidebar(); renderFilterBar(); renderCurrentView(); }
function renderCurrentView() {
  if (state.view === 'kanban')         renderKanban();
  else if (state.view === 'calendar')  renderCalendar();
  else if (state.view === 'dashboard') renderDashboard();
  else renderList();
}

// ====== SIDEBAR ======
function renderSidebar() {
  // ── Etapas ──
  var ef = document.getElementById('etapaFilters');
  ef.innerHTML = '';
  COLS.forEach(function(col) {
    var cnt = state.tasks.filter(function(t) { return t.status === col.id; }).length;
    var active = state.filters.status === col.id;
    var color = STATUS_COLORS[col.id] || '#888';
    var el = document.createElement('div');
    el.className = 'etapa-row' + (active ? ' active' : '');
    el.style.setProperty('--ec', color);
    if (active) { el.querySelector && null; el.style.color = color; }
    el.innerHTML =
      '<div class="etapa-pip" style="background:' + color + '"></div>' +
      '<span class="etapa-label">' + col.label + '</span>' +
      '<span class="sec-count">' + cnt + '</span>';
    el.style.cssText += ';';
    if (active) el.style.color = color;
    // active bar color
    el.style.setProperty('--bar', color);
    el.addEventListener('click', (function(colId, isActive) {
      return function() {
        state.filters.status = isActive ? 'all' : colId;
        // sync chip
        var chips = document.querySelectorAll('.chips .chip');
        chips.forEach(function(b) { b.classList.remove('active'); });
        var target = isActive ? document.getElementById('chip-all') : document.getElementById('chip-' + colId);
        if (target) target.classList.add('active');
        renderAll();
      };
    })(col.id, active));
    ef.appendChild(el);
    // apply ::before color via inline style trick
    if (active) {
      var style = el.style;
      // We inject a data attribute for CSS to pick up
      el.setAttribute('data-color', color);
    }
  });

  // ── Setores ──
  var sf = document.getElementById('sectorFilters');
  sf.innerHTML = '';
  var _sectors = Array.isArray(state.sectors) ? state.sectors : [];
  _sectors.forEach(function(s) {
    var cnt = state.tasks.filter(function(t) { return t.sector === s.id; }).length;
    var active = state.filters.sector === s.id;
    var el = document.createElement('div');
    el.className = 'sector-row' + (active ? ' active' : '');
    if (active) el.style.color = s.color;
    el.innerHTML = '<div class="sec-dot" style="background:' + s.color + '"></div><span class="sec-name">' + esc(s.name) + '</span><span class="sec-count">' + cnt + '</span>';
    el.onclick = (function(sid, act) { return function() { state.filters.sector = act ? null : sid; renderAll(); }; })(s.id, active);
    sf.appendChild(el);
  });

  // ── Projetos ──
  var pl = document.getElementById('projectList');
  pl.innerHTML = '';
  var _projects = Array.isArray(state.projects) ? state.projects : [];
  var activeProjs = _projects.filter(function(p) { return !p.done; });
  var doneProjs   = _projects.filter(function(p) { return  p.done; });

  if (!_projects.length) {
    pl.innerHTML = '<div style="font-size:11px;color:var(--text3);padding:4px 10px">Nenhum projeto</div>';
  }

  function buildProjRow(p) {
    var el = document.createElement('div');
    el.className = 'proj-row' + (state.filters.project === p.id ? ' active' : '') + (p.done ? ' proj-done-row' : '');
    el.innerHTML =
      '<div class="proj-bar" style="background:' + p.color + '"></div>' +
      '<span style="flex:1;' + (p.done ? 'text-decoration:line-through;' : '') + '">' + esc(p.name) + '</span>' +
      '<div class="proj-row-actions">' +
        (!p.done ? '<button class="proj-add-task" title="Adicionar tarefa" data-pid="' + p.id + '">+</button>' : '') +
        '<button class="proj-done-btn' + (p.done ? ' done' : '') + '" title="' + (p.done ? 'Reabrir projeto' : 'Marcar como concluído') + '" data-pid="' + p.id + '">' +
          '<svg width="12" height="12" fill="none" stroke="' + (p.done ? '#00e676' : 'currentColor') + '" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' +
        '</button>' +
        '<button class="proj-del" title="Excluir projeto" data-pid="' + p.id + '">&#215;</button>' +
      '</div>';

    // click on bar or name = filter
    el.querySelector('.proj-bar').addEventListener('click', (function(pid) {
      return function() { state.filters.project = state.filters.project === pid ? null : pid; renderAll(); };
    })(p.id));
    el.querySelector('span').addEventListener('click', (function(pid) {
      return function() { state.filters.project = state.filters.project === pid ? null : pid; renderAll(); };
    })(p.id));

    // add task button (only on active projects)
    var addBtn = el.querySelector('.proj-add-task');
    if (addBtn) {
      addBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        openNewTask('todo', '', this.dataset.pid);
      });
    }

    // done toggle
    el.querySelector('.proj-done-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      var pid = this.dataset.pid;
      var proj = state.projects.find(function(x) { return x.id === pid; });
      if (!proj) return;
      proj.done = !proj.done;
      if (proj.done) {
        // deselect if active filter
        if (state.filters.project === pid) state.filters.project = null;
        showToast('Projeto "' + proj.name + '" concluído. Tarefas ocultadas do calendário.', 'success');
      } else {
        showToast('Projeto "' + proj.name + '" reaberto.', 'success');
      }
      saveState(); renderAll();
    });

    // delete
    el.querySelector('.proj-del').addEventListener('click', function(e) {
      e.stopPropagation();
      var pid = this.dataset.pid;
      if (!confirm('Excluir este projeto? As tarefas vinculadas não serão apagadas.')) return;
      state.projects = state.projects.filter(function(x) { return x.id !== pid; });
      state.tasks.forEach(function(t) { if (t.project === pid) t.project = ''; });
      if (state.filters.project === pid) state.filters.project = null;
      saveState(); renderAll();
    });

    return el;
  }

  activeProjs.forEach(function(p) { pl.appendChild(buildProjRow(p)); });

  // toggle "ver concluídos"
  if (doneProjs.length > 0) {
    var toggleBtn = document.createElement('button');
    toggleBtn.className = 'proj-show-done';
    toggleBtn.textContent = (state.showDoneProjects ? '▾ ' : '▸ ') + doneProjs.length + ' projeto' + (doneProjs.length > 1 ? 's' : '') + ' concluído' + (doneProjs.length > 1 ? 's' : '');
    toggleBtn.addEventListener('click', function() {
      state.showDoneProjects = !state.showDoneProjects;
      saveState(); renderAll();
    });
    pl.appendChild(toggleBtn);

    if (state.showDoneProjects) {
      doneProjs.forEach(function(p) { pl.appendChild(buildProjRow(p)); });
    }
  }
}

function renderFilterBar() {
  var bar = document.getElementById('filterBar');
  if (!bar) return;
  bar.innerHTML = '';
  var f = state.filters;
  var hasActive = (f.status !== 'all' || f.sector || f.project || f.overdue || f.dateRange);

  // ── Etapas ──
  var lbl = document.createElement('span'); lbl.className = 'fb-label'; lbl.textContent = 'Etapa:'; bar.appendChild(lbl);
  COLS.forEach(function(col) {
    var c = STATUS_COLORS[col.id];
    var active = f.status === col.id;
    var btn = document.createElement('button');

    if (active) btn.style.background = c;
    btn.innerHTML = '<span class="fc-dot" style="background:' + c + ';' + (active ? 'opacity:.8' : '') + '"></span>' + col.label;
    btn.addEventListener('click', function() {
      f.status = active ? 'all' : col.id;
      // sync old chips
      document.querySelectorAll('.chips .chip').forEach(function(b) { b.classList.remove('active'); });
      var chip = document.getElementById('chip-' + (active ? 'all' : col.id));

      renderAll();
    });
    bar.appendChild(btn);
  });

  // ── Sep ──
  var sep1 = document.createElement('div'); sep1.className = 'fb-sep'; bar.appendChild(sep1);

  // ── Setores ──
  var lbl2 = document.createElement('span'); lbl2.className = 'fb-label'; lbl2.textContent = 'Setor:'; bar.appendChild(lbl2);
  (Array.isArray(state.sectors) ? state.sectors : []).forEach(function(s) {
    var active = f.sector === s.id;
    var btn = document.createElement('button');
    btn.className = 'fc' + (active ? ' active' : '');
    if (active) btn.style.background = s.color;
    btn.innerHTML = '<span class="fc-dot" style="background:' + s.color + '"></span>' + esc(s.name);
    btn.addEventListener('click', function() {
      f.sector = active ? null : s.id;
      renderAll();
    });
    bar.appendChild(btn);
  });

  // ── Sep ──
  var sep2 = document.createElement('div'); sep2.className = 'fb-sep'; bar.appendChild(sep2);

  // ── Data ──
  var lbl3 = document.createElement('span'); lbl3.className = 'fb-label'; lbl3.textContent = 'Período:'; bar.appendChild(lbl3);
  [
    { id: 'today', label: 'Hoje' },
    { id: 'week',  label: 'Esta semana' },
    { id: 'month', label: 'Este mês' }
  ].forEach(function(opt) {
    var active = f.dateRange === opt.id;

    btn.className = 'fc' + (active ? ' active' : '');

    btn.textContent = opt.label;
    if (active) { btn.style.background = '#334155'; btn.style.color = '#e2e8f0'; btn.style.borderColor = '#475569'; }
    btn.addEventListener('click', function() {
      f.dateRange = active ? null : opt.id;
      renderAll();
    });
    bar.appendChild(btn);
  });

  // ── Sep ──
  var sep3 = document.createElement('div'); sep3.className = 'fb-sep'; bar.appendChild(sep3);

  // ── Atrasados ──

  overdueBtn.innerHTML = (f.overdue ? '● ' : '○ ') + 'Atrasados';
  overdueBtn.addEventListener('click', function() {
    f.overdue = !f.overdue;
    renderAll();
  });
  bar.appendChild(overdueBtn);

  // ── Limpar tudo ──
  if (hasActive) {
    var sep4 = document.createElement('div'); sep4.className = 'fb-sep'; bar.appendChild(sep4);
    var clr = document.createElement('button');
    clr.className = 'fc-clear';
    clr.textContent = '✕ Limpar filtros';
    clr.addEventListener('click', function() {
      state.filters = { status: 'all', sector: null, project: null, overdue: false, dateRange: null };
      document.querySelectorAll('.chips .chip').forEach(function(b) { b.classList.remove('active'); });
      var ca = document.getElementById('chip-all'); if (ca) ca.classList.add('active');
      renderAll();
    });
    bar.appendChild(clr);
  }
}

function getFiltered() {
  var now = new Date();
  // date range bounds
  var rangeStart = null, rangeEnd = null;
  if (state.filters.dateRange === 'week') {
    var dow = now.getDay();
    rangeStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - dow);
    rangeEnd   = new Date(now.getFullYear(), now.getMonth(), now.getDate() + (6 - dow), 23, 59, 59);
  } else if (state.filters.dateRange === 'today') {
    rangeStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    rangeEnd   = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
  } else if (state.filters.dateRange === 'month') {
    rangeStart = new Date(now.getFullYear(), now.getMonth(), 1);
    rangeEnd   = new Date(now.getFullYear(), now.getMonth()+1, 0, 23, 59, 59);
  }
  return state.tasks.filter(function(t) {
    if (state.filters.status !== 'all' && t.status !== state.filters.status) return false;
    if (state.filters.sector && t.sector !== state.filters.sector) return false;
    if (state.filters.project && t.project !== state.filters.project) return false;
    if (state.filters.overdue) {
      var isOverdue = t.date && new Date(t.date) < now && t.status !== 'done';
      if (!isOverdue) return false;
    }
    if (rangeStart && rangeEnd) {
      if (!t.date) return false;
      var td = new Date(t.date);
      if (td < rangeStart || td > rangeEnd) return false;
    }
    return true;
  });
}

// ====== KANBAN ======
var COLS = [
  { id: 'todo',    label: 'A Fazer',             cls: 'col-todo'    },
  { id: 'doing',   label: 'Em Andamento',         cls: 'col-doing'   },
  { id: 'waiting', label: 'Aguardando Resposta',  cls: 'col-waiting' },
  { id: 'done',    label: 'Concluído',            cls: 'col-done'    }
];
var STATUS_COLORS = { todo: '#4a9eff', doing: '#e8000d', waiting: '#f59e0b', done: '#00e676' };

function renderKanban() {
  var board = document.getElementById('kanbanView');
  board.innerHTML = '';
  var tasks = getFiltered();
  COLS.forEach(function(col) {
    var colTasks = tasks.filter(function(t) { return t.status === col.id; });
    var col_el = document.createElement('div');
    col_el.className = 'kb-col ' + col.cls;
    col_el.dataset.colId = col.id;

    var cardsContainer = document.createElement('div');
    cardsContainer.className = 'kb-cards';
    cardsContainer.dataset.status = col.id;

    if (colTasks.length === 0) {
      cardsContainer.innerHTML = '<div class="empty">Sem tarefas</div>';
    } else {
      colTasks.forEach(function(t) {
        var card = buildTaskCard(t);
        cardsContainer.appendChild(card);
      });
    }

    col_el.innerHTML =
      '<div class="kb-hd">' +
        '<span class="kb-title">' + col.label + '</span>' +
        '<span class="kb-count">' + colTasks.length + '</span>' +
      '</div>';
    col_el.appendChild(cardsContainer);

    var addBtn = document.createElement('button');
    addBtn.className = 'kb-add';
    addBtn.dataset.status = col.id;
    addBtn.innerHTML = '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Adicionar';
    addBtn.addEventListener('click', function() { openNewTask(col.id, ''); });
    col_el.appendChild(addBtn);

    // ── Drop zone events ──
    cardsContainer.addEventListener('dragover', function(e) {
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      this.classList.add('drag-over-col');
    });
    cardsContainer.addEventListener('dragleave', function(e) {
      if (!this.contains(e.relatedTarget)) this.classList.remove('drag-over-col');
    });
    cardsContainer.addEventListener('drop', function(e) {
      e.preventDefault();
      this.classList.remove('drag-over-col');
      var id = e.dataTransfer.getData('text/plain');
      var newStatus = this.dataset.status;
      var task = state.tasks.find(function(t) { return t.id === id; });
      if (task && task.status !== newStatus) {
        task.status = newStatus;
        saveState(); renderAll();
      }
    });

    board.appendChild(col_el);
  });
}

function buildTaskCard(t) {
  var s = state.sectors.find(function(s) { return s.id === t.sector; });
  var p = state.projects.find(function(p) { return p.id === t.project; });
  var color = s ? s.color : '#3a3f52';
  var overdue = t.date && new Date(t.date) < new Date() && t.status !== 'done';

  var card = document.createElement('div');
  card.className = 'task-card';
  card.dataset.id = t.id;
  card.draggable = true;
  card.style.borderLeftColor = color;

  // ── title ──
  var titleDiv = document.createElement('div');
  titleDiv.className = 'tc-title';
  titleDiv.style.display = 'flex';
  titleDiv.style.alignItems = 'flex-start';
  titleDiv.style.gap = '6px';
  var titleText = document.createElement('span');
  titleText.style.flex = '1';
  titleText.textContent = t.title;
  titleDiv.appendChild(titleText);
  if (overdue) {
    var badge = document.createElement('span');
    badge.className = 'tc-overdue';
    badge.title = 'Atrasada';
    badge.textContent = '!';
    titleDiv.appendChild(badge);
  }
  // recur badge
  if (t.recur) {
    var recurLabels = { daily:'↺D', weekly:'↺S', biweekly:'↺Q', monthly:'↺M' };
    var rb = document.createElement('span');
    rb.className = 'recur-badge';
    rb.title = { daily:'Diária', weekly:'Semanal', biweekly:'Quinzenal', monthly:'Mensal' }[t.recur] || '';
    rb.textContent = recurLabels[t.recur] || '↺';
    titleDiv.appendChild(rb);
  }
  card.appendChild(titleDiv);

  // ── date row ──
  var dateRow = document.createElement('div');
  dateRow.className = 'tc-date-row';
  if (t.date) {
    dateRow.innerHTML =
      '<svg class="tc-date-icon" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>' +
      '<span class="tc-date' + (overdue ? ' ov' : '') + '" style="cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px">' + fmtDate(t.date) + '</span>';
  } else {
    dateRow.innerHTML = '<span style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--text3);cursor:pointer;opacity:.5;letter-spacing:.04em">+ prazo</span>';
  }
  dateRow.style.cursor = 'pointer';
  dateRow.addEventListener('click', function(e) {
    e.stopPropagation();
    openDatePopover(e, t.id);
  });
  card.appendChild(dateRow);

  // ── tags row (projeto + gcal) ──
  if (p || t.gcalId) {
    var metaDiv = document.createElement('div');
    metaDiv.className = 'tc-meta';
    if (p) {
      metaDiv.innerHTML += '<span class="tc-proj"><span class="tc-proj-dot" style="background:' + p.color + '"></span>' + esc(p.name) + '</span>';
    }
    if (t.gcalId) metaDiv.innerHTML += '<span class="tag" style="color:#60a5fa;background:#60a5fa15">GCal</span>';
    card.appendChild(metaDiv);
  }

  // ── quick-actions row ──
  var actionsDiv = document.createElement('div');
  actionsDiv.className = 'tc-actions';

  // status dots
  var statusRow = document.createElement('div');
  statusRow.className = 'tc-status-row';
  statusRow.innerHTML = '<span class="tc-actions-lbl">Status</span>';
  COLS.forEach(function(col) {
    var dot = document.createElement('div');
    dot.className = 'status-dot' + (t.status === col.id ? ' active' : '');
    dot.dataset.s = col.id;
    dot.title = col.label;
    dot.addEventListener('click', function(e) {
      e.stopPropagation();
      var task = state.tasks.find(function(x) { return x.id === t.id; });
      if (task) { task.status = col.id; saveState(); renderAll(); }
    });
    statusRow.appendChild(dot);
  });
  actionsDiv.appendChild(statusRow);

  // sector pips
  var sectorRow = document.createElement('div');
  sectorRow.className = 'tc-sector-row';
  sectorRow.innerHTML = '<span class="tc-actions-lbl">Setor</span>';
  var _sectors = Array.isArray(state.sectors) ? state.sectors : [];
  _sectors.forEach(function(sec) {
    var pip = document.createElement('div');
    pip.className = 'sector-pip' + (t.sector === sec.id ? ' active' : '');
    pip.style.background = sec.color;
    pip.title = sec.name;
    pip.addEventListener('click', function(e) {
      e.stopPropagation();
      var task = state.tasks.find(function(x) { return x.id === t.id; });
      if (task) {
        task.sector = (task.sector === sec.id) ? '' : sec.id;
        saveState(); renderAll();
      }
    });
    sectorRow.appendChild(pip);
  });
  actionsDiv.appendChild(sectorRow);
  card.appendChild(actionsDiv);

  // ── Drag events ──
  card.addEventListener('dragstart', function(e) {
    e.dataTransfer.setData('text/plain', t.id);
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(function() { card.classList.add('dragging'); }, 0);
  });
  card.addEventListener('dragend', function() {
    card.classList.remove('dragging');
  });

  // ── Click to open modal (only if not dragging) ──
  card.addEventListener('click', function(e) {
    if (e.target.classList.contains('status-dot') || e.target.classList.contains('sector-pip')) return;
    openEditTask(t.id);
  });

  return card;
}
